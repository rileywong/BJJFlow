      <div className="flex items-center gap-4 flex-wrap">
        <div className="h-11 w-11 rounded-xl flex items-center justify-center shrink-0" style={{ background: BELTS[profile.belt] || "#e7ebf5", border: "2px solid rgba(255,255,255,.15)" }}>
          <div className="flex gap-0.5">{[0, 1, 2, 3].map(i => <span key={i} className="h-4 w-1 rounded-sm" style={{ background: i < profile.stripes ? (profile.belt === "Black" ? "#ef4444" : "#111827") : "rgba(255,255,255,.2)" }} />)}</div>
        </div>
        <div>
          <div className="font-display text-lg font-bold text-white">{greet} 👋</div>
          <div className="text-xs text-slate-400">{profile.belt} belt{profile.stripes ? ` · ${profile.stripes} stripe${profile.stripes !== 1 ? "s" : ""}` : ""} · 🔥 {streak}-week streak</div>
        </div>
        <div className="flex items-center gap-2 ml-2">
          <div className="relative">
            <svg width="48" height="48" className="-rotate-90"><circle cx="24" cy="24" r={r} fill="none" stroke="#27314a" strokeWidth="5" /><circle cx="24" cy="24" r={r} fill="none" stroke={thisWeek >= goal ? "#34d399" : "#6366f1"} strokeWidth="5" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - pct)} /></svg>
            <span className="absolute inset-0 flex items-center justify-center text-[11px] font-bold text-white">{thisWeek}/{goal}</span>
          </div>
          <span className="text-xs text-slate-400">this week</span>
        </div>
        <div className="ml-auto flex flex-wrap gap-2">
          <button onClick={onStartSession} className="text-sm px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white font-semibold transition">▶ Start today's session</button>
          {activePlan && <button onClick={onFollowPlan} className="text-sm px-3 py-2 rounded-lg bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-200 border border-emerald-400/30 transition">Follow my plan</button>}
          <button onClick={onLogClass} className="text-sm px-3 py-2 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200 border border-white/5 transition">📒 Log a class</button>
        </div>
      </div>
      <div className={`mt-3 flex items-center gap-2 rounded-xl px-3 py-2 ring-1 ${missionDone ? "bg-emerald-500/10 ring-emerald-400/30" : "bg-amber-400/10 ring-amber-400/30"}`}>
        <span className="text-base shrink-0">{missionDone ? "✅" : "🎯"}</span>
        <span className="text-[11px] uppercase tracking-widest text-slate-500 shrink-0 hidden sm:inline">Daily mission</span>
        <span className={`text-sm flex-1 min-w-0 truncate ${missionDone ? "text-emerald-200 line-through" : "text-slate-100"}`}>{dailyMission.t}</span>
        {!missionDone && onAction && <button onClick={() => onAction(missionAction)} className="shrink-0 text-xs px-2.5 py-1 rounded-md bg-ink-700 hover:bg-ink-600 text-slate-200 border border-white/5 transition">{dailyMission.cta} →</button>}
        {onMissionDone && <button onClick={() => onMissionDone(todayStr)} className={`shrink-0 text-xs px-2.5 py-1 rounded-md transition ${missionDone ? "bg-emerald-500/20 text-emerald-200" : "bg-amber-400/20 text-amber-200 hover:bg-amber-400/30"}`}>{missionDone ? "✓ Done" : "Mark done"}</button>}
      </div>
      {topInsight && onAction && (
        <button onClick={() => onAction(topInsight.cta.action)}
          className="mt-3 w-full flex items-center gap-2 text-left rounded-xl bg-ink-800/60 hover:bg-ink-700/70 ring-1 ring-white/5 px-3 py-2 transition">
          <span className="text-base shrink-0">{topInsight.icon}</span>
          <span className="text-sm text-slate-200 flex-1 min-w-0 truncate">{topInsight.title}</span>
          <span className="text-xs text-indigo-300 shrink-0">{topInsight.cta.label} →</span>
        </button>
      )}
    </div>
  );
}

//////////////////////////////////////////////////////////////////////////////
//  MAIN APP
//////////////////////////////////////////////////////////////////////////////

function App() {
  const [history, setHistory] = React.useState(["standing"]);
  const [query, setQuery] = React.useState("");
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const [animKey, setAnimKey] = React.useState(0);
  const [mapOpen, setMapOpen] = React.useState(false);
  const [plansOpen, setPlansOpen] = React.useState(false);
  const [drillOpen, setDrillOpen] = React.useState(false);
  const [favorites, setFavorites] = useLocalStorage("bjjflow:favs", []);
  const [savedFlows, setSavedFlows] = useLocalStorage("bjjflow:flows", []);
  const [notes, setNotes] = useLocalStorage("bjjflow:notes", {});
  const [plans, setPlans] = useLocalStorage("bjjflow:plans", []);
  const [activePlanId, setActivePlanId] = useLocalStorage("bjjflow:activePlan", null);
  const [cmdkOpen, setCmdkOpen] = React.useState(false);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [dashOpen, setDashOpen] = React.useState(false);
  const [trainOpen, setTrainOpen] = React.useState(false);
  const [athleteOpen, setAthleteOpen] = React.useState(false);
  const scrollRef = React.useRef(null);
  const [ruleset, setRuleset] = useLocalStorage("bjjflow:ruleset", "Open Mat (all legal)");
  const [learned, setLearned] = useLocalStorage("bjjflow:learned", []);
  const [settings, setSettings] = useLocalStorage("bjjflow:settings", { colorblind: false, reduceMotion: false, showPoints: true });
  const [srs, setSrs] = useLocalStorage("bjjflow:srs", {});
  const [drillAgg, setDrillAgg] = useLocalStorage("bjjflow:drillAgg", { seen: 0, correct: 0 });
  const [videos, setVideos] = useLocalStorage("bjjflow:videos", {});
  const [seen, setSeen] = useLocalStorage("bjjflow:seen", false);
  const [welcomeOpen, setWelcomeOpen] = React.useState(!seen);
  const [toolsOpen, setToolsOpen] = React.useState(false);
  const [sessions, setSessions] = useLocalStorage("bjjflow:sessions", []);
  const [profile, setProfile] = useLocalStorage("bjjflow:profile", { belt: "White", stripes: 0, since: "", weeklyGoal: 3, name: "" });
  const [promotions, setPromotions] = useLocalStorage("bjjflow:promotions", []);
  const [rolls, setRolls] = useLocalStorage("bjjflow:rolls", []);
  const [journalOpen, setJournalOpen] = React.useState(false);
  const [insightsOpen, setInsightsOpen] = React.useState(false);
  const [goalsOpen, setGoalsOpen] = React.useState(false);
  const [goals, setGoals] = useLocalStorage("bjjflow:goals", []);
  const [mission, setMission] = useLocalStorage("bjjflow:mission", { date: "", done: false });
  const [comps, setComps] = useLocalStorage("bjjflow:comps", []);
  const [shareOpen, setShareOpen] = React.useState(false);
  const [timerOpen, setTimerOpen] = React.useState(false);
  const [notesOpen, setNotesOpen] = React.useState(false);
  const [studyOpen, setStudyOpen] = React.useState(false);
  const [drillFocus, setDrillFocus] = React.useState(null);
  const [studyScope, setStudyScope] = React.useState("learn");
  const [trainTab, setTrainTab] = React.useState("position");
  const dismissWelcome = () => { setSeen(true); setWelcomeOpen(false); };

  const addComp = (entry) => setComps(c => [{ id: Date.now(), ...entry }, ...c]);
  const deleteComp = (id) => setComps(c => c.filter(e => e.id !== id));

  const addGoal = (metric, target) => setGoals(g => (g.some(x => x.metric === metric) ? g : [...g, { id: Date.now(), metric, target: Number(target) || 1 }]));
  const removeGoal = (id) => setGoals(g => g.filter(x => x.id !== id));
  const setGoalTarget = (id, target) => setGoals(g => g.map(x => x.id === id ? { ...x, target } : x));

  const addLog = (entry) => setSessions(s => [{ id: Date.now(), ...entry }, ...s].slice(0, 200));
  const deleteSession = (id) => setSessions(s => s.filter(e => e.id !== id));
  const addPromotion = (entry) => setPromotions(p => [{ id: Date.now(), ...entry }, ...p]);
  const deletePromotion = (id) => setPromotions(p => p.filter(e => e.id !== id));
  const addRoll = (entry) => setRolls(r => [{ id: Date.now(), ...entry }, ...r].slice(0, 300));
  const deleteRoll = (id) => setRolls(r => r.filter(e => e.id !== id));
  const openTrain = (tab) => { setTrainTab(tab || "position"); setTrainOpen(true); };
  const openDrill = (id) => { setDrillFocus(id || null); openDrill(); };
  const openStudy = (sc) => { setStudyScope(sc || "learn"); openStudy(); };
  const markMissionDone = (date) => setMission({ date, done: true });
  const onInsightAction = (a) => {
    setInsightsOpen(false);
    switch (a.type) {
      case "jump": goTo(a.id, { viaArchive: true }); break;
      case "jumpGroup": { const p = Object.values(POSITIONS).find(x => x.group === a.group); if (p) goTo(p.id, { viaArchive: true }); break; }
      case "drill": openDrill(); break;
      case "plans": setPlansOpen(true); break;
      case "journal": setJournalOpen(true); break;
      case "insights": setInsightsOpen(true); break;
      case "followPlan": followPlan(); break;
      case "train": openTrain("position"); break;
      default: break;
    }
  };

  const logSession = (entry) => {
    setSessions(s => [{ id: Date.now(), date: new Date().toISOString().slice(0, 10), ...entry }, ...s].slice(0, 60));
    // Feed spaced repetition: a light "practiced" bump on each focus position.
    if (entry.focusIds && entry.focusIds.length) {
      setSrs(prev => { const n = { ...prev }; entry.focusIds.forEach(id => { const c = n[id] || { box: 1, seen: 0, correct: 0 }; n[id] = { box: Math.min(c.box + 1, 5), seen: c.seen + 1, correct: c.correct + 1 }; }); return n; });
    }
  };

  const setVideo = (id, url) => setVideos(v => (url ? { ...v, [id]: url } : (() => { const n = { ...v }; delete n[id]; return n; })()));
  const clearVideo = (id) => setVideos(v => { const n = { ...v }; delete n[id]; return n; });
  const getVideo = (id) => { const u = videos[id]; const p = u && parseYouTube(u); return p || DEFAULT_VIDEOS[id] || null; };

  // colorblind palette is read by the module-level ratingColor()
  setColorblind(!!settings.colorblind);

  const currentId = history[history.length - 1];
  const pos = POSITIONS[currentId];
  const isFav = favorites.includes(currentId);
  const isLearned = learned.includes(currentId);
  const activePlan = plans.find(p => p.id === activePlanId) || null;
  const plannedLabel = activePlan ? activePlan.picks[currentId] : null;
  const score = scorePath(history);
  const incoming = INCOMING[currentId] || [];
  const posIllegal = isIllegal(currentId, ruleset);

  const toggleLearned = (id) =>
    setLearned(l => l.includes(id) ? l.filter(x => x !== id) : [...l, id]);
  const recordDrill = (key, correct) => {
    if (key) setSrs(s => { const cur = s[key] || { box: 1, seen: 0, correct: 0 }; return { ...s, [key]: { box: correct ? Math.min(cur.box + 1, 5) : 1, seen: cur.seen + 1, correct: cur.correct + (correct ? 1 : 0) } }; });
    setDrillAgg(a => ({ seen: a.seen + 1, correct: a.correct + (correct ? 1 : 0) }));
  };
  const exportPlan = (plan) => {
    try {
      const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ name: plan.name, style: plan.style, picks: plan.picks }))));
      const url = `${location.origin}${location.pathname}#plan=${payload}`;
      navigator.clipboard && navigator.clipboard.writeText(url);
      return url;
    } catch (e) { return null; }
  };

  const updateActivePlan = (mut) =>
    setPlans(ps => ps.map(p => (p.id === activePlanId ? mut(p) : p)));

  const setPick = (posId, label) => {
    if (!activePlan) return;
    updateActivePlan(p => {
      const picks = { ...p.picks };
      if (picks[posId] === label) delete picks[posId];
      else picks[posId] = label;
      return { ...p, picks };
    });
  };
  const clearPick = (posId) =>
    updateActivePlan(p => { const picks = { ...p.picks }; delete picks[posId]; return { ...p, picks }; });

  const createPlan = (name, style) => {
    const preset = STYLE_PRESETS[style] || { picks: {} };
    const id = Date.now();
    const plan = { id, name: (name && name.trim()) || style, style, picks: { ...preset.picks } };
    setPlans(ps => [plan, ...ps]);
    setActivePlanId(id);
  };
  const deletePlan = (id) => {
    setPlans(ps => ps.filter(p => p.id !== id));
    if (activePlanId === id) setActivePlanId(null);
  };
  const followPlan = () => {
    if (!activePlan) return;
    const chain = ["standing"]; const seen = new Set(["standing"]); let cur = "standing";
    for (let i = 0; i < 60; i++) {
      const label = activePlan.picks[cur];
      if (!label) break;
      const tr = (POSITIONS[cur].transitions || []).find(t => t.label === label);
      if (!tr) break;
      chain.push(tr.to);
      if (seen.has(tr.to) || POSITIONS[tr.to].group === "Submissions") break;
      seen.add(tr.to); cur = tr.to;
    }
    setHistory(chain); setAnimKey(k => k + 1); setPlansOpen(false);
  };
  const setNote = (posId, text) => setNotes(n => ({ ...n, [posId]: text }));

  // One-tap printable program: game plan + weekly plan + a sample session.
  const exportProgram = () => {
    const plan = activePlan;
    const focus = plan && Object.keys(plan.picks).length ? Object.keys(plan.picks) : ["standing", currentId];
    const session = buildSession(focus, 60, Math.floor(Math.random() * 9999) + 1, true);
    const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const planSection = plan && Object.keys(plan.picks).length
      ? `<table><thead><tr><th>Position</th><th>My go-to</th></tr></thead><tbody>${Object.entries(plan.picks).map(([pid, label]) => `<tr><td>${esc(POSITIONS[pid] ? POSITIONS[pid].name : pid)}</td><td>${esc(label)}</td></tr>`).join("")}</tbody></table>`
      : `<p class="muted">No active game plan — open Plans to build one.</p>`;
    const weekSection = `<table><tbody>${WEEKLY.map(d => `<tr><td class="day">${d.d} <span class="tag">${d.tag}</span></td><td>${d.items.map(esc).join(" · ")}</td></tr>`).join("")}</tbody></table><p class="muted">${esc(WEEKLY_NOTE)}</p>`;
    const sessionSection = session.map(b => `<div class="block"><h4>${esc(b.name)} <span class="muted">— ${b.mins} min</span></h4><ul>${b.items.map(it => `<li>${esc(it.name)}${it.reps ? ` <em>(${esc(it.reps)})</em>` : ""}</li>`).join("")}</ul></div>`).join("");
    const doc = `<!doctype html><html><head><meta charset="utf-8"><title>SubMap — My Program</title><style>
      *{box-sizing:border-box} body{font-family:-apple-system,Segoe UI,Roboto,Inter,sans-serif;max-width:820px;margin:24px auto;padding:0 20px;color:#111;line-height:1.5}
      h1{margin:0 0 2px;font-size:26px} h2{margin:26px 0 8px;border-bottom:2px solid #6366f1;padding-bottom:4px;font-size:18px} h4{margin:10px 0 4px}
      .sub{color:#666;margin:0 0 8px} table{width:100%;border-collapse:collapse;margin:6px 0} th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:14px;vertical-align:top}
      th{background:#f3f4f6} .muted{color:#777;font-size:13px} .tag{font-size:10px;background:#eef2ff;color:#4338ca;padding:1px 6px;border-radius:8px;margin-left:4px} .day{white-space:nowrap;font-weight:600;width:120px}
      .block{break-inside:avoid;margin:4px 0} ul{margin:4px 0 0 18px} em{color:#555} .toolbar{margin:0 0 12px} button{font-size:14px;padding:8px 14px;border:0;border-radius:8px;background:#6366f1;color:#fff;cursor:pointer}
      @media print{.toolbar{display:none}}
    </style></head><body>
      <div class="toolbar"><button onclick="window.print()">🖨 Print / Save as PDF</button></div>
      <h1>SubMap — My Program</h1>
      <p class="sub">${plan ? esc(plan.name) + " · " + esc(plan.style) + " style" : "General program"} · generated ${new Date().toLocaleDateString()}</p>
      <h2>Game Plan — my A-game</h2>${planSection}
      <h2>Weekly Training Split</h2>${weekSection}
      <h2>Sample ~60-min Session</h2>${sessionSection}
      <p class="muted" style="margin-top:24px">Generated by SubMap. Training content is general guidance — scale to your level and tap early.</p>
    </body></html>`;
    const w = window.open("", "_blank");
    if (w) { w.document.write(doc); w.document.close(); }
    else { const blob = new Blob([doc], { type: "text/html" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "submap-program.html"; a.click(); }
  };

  const toggleFav = (id) =>
    setFavorites(f => f.includes(id) ? f.filter(x => x !== id) : [...f, id]);

  const saveCurrentFlow = () => {
    if (history.length < 2) return;
    const entry = {
      id: Date.now(),
      path: [...history],
      label: `${POSITIONS[history[0]].name} → ${POSITIONS[currentId].name}`,
      steps: history.length,
    };
    setSavedFlows(s => [entry, ...s].slice(0, 25));
  };
  const loadFlow = (path) => {
    const clean = path.filter(id => POSITIONS[id]);
    if (clean.length) { setHistory(clean); setAnimKey(k => k + 1); setSidebarOpen(false); }
  };
  const deleteFlow = (id) => setSavedFlows(s => s.filter(e => e.id !== id));

  const goTo = (id, { viaArchive = false } = {}) => {
    if (!POSITIONS[id]) return;
    setHistory(h => (viaArchive ? [...h, id] : [...h, id]));
    setAnimKey(k => k + 1);
    setSidebarOpen(false);
  };

  const jumpTo = (index) => {
    setHistory(h => h.slice(0, index + 1));
    setAnimKey(k => k + 1);
  };

  const back = () => {
    if (history.length > 1) { setHistory(h => h.slice(0, -1)); setAnimKey(k => k + 1); }
  };

  const reset = () => { setHistory(["standing"]); setAnimKey(k => k + 1); };

  const importPlan = (obj) => {
    const id = Date.now();
    const plan = { id, name: obj.name || "Imported plan", style: (obj.style && STYLE_PRESETS[obj.style]) ? obj.style : "Blank", picks: obj.picks || {} };
    setPlans(ps => [plan, ...ps]); setActivePlanId(id);
  };

  // Import a shared plan from the URL hash (#plan=…), then clean the URL.
  React.useEffect(() => {
    const m = (location.hash || "").match(/plan=([^&]+)/);
    if (m) {
      try {
        const obj = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
        if (obj && obj.picks) { importPlan(obj); setPlansOpen(true); }
      } catch (e) {}
      window.history.replaceState(null, "", location.pathname);
    }
  }, []); // eslint-disable-line

  // Global keyboard shortcuts.
  React.useEffect(() => {
    const onKey = (e) => {
      const tag = (e.target.tagName || "").toLowerCase();
      const typing = tag === "input" || tag === "textarea" || e.target.isContentEditable;
      const anyModal = mapOpen || plansOpen || drillOpen || settingsOpen || dashOpen || cmdkOpen || trainOpen || athleteOpen || welcomeOpen || journalOpen || insightsOpen || goalsOpen || shareOpen || timerOpen || notesOpen || studyOpen;
      if ((e.key === "k" || e.key === "K") && (e.metaKey || e.ctrlKey)) { e.preventDefault(); setCmdkOpen(v => !v); return; }
      if (typing) return;
      if (e.key === "Escape") { setCmdkOpen(false); setSettingsOpen(false); setDashOpen(false); setMapOpen(false); setPlansOpen(false); setDrillOpen(false); setTrainOpen(false); setAthleteOpen(false); setToolsOpen(false); setWelcomeOpen(false); setJournalOpen(false); setInsightsOpen(false); setGoalsOpen(false); setShareOpen(false); setTimerOpen(false); setNotesOpen(false); setStudyOpen(false); return; }
      if (anyModal) return;
      if (/^[1-9]$/.test(e.key)) { const t = pos.transitions[+e.key - 1]; if (t) goTo(t.to); return; }
      switch (e.key.toLowerCase()) {
        case "b": back(); break;
        case "r": reset(); break;
        case "m": setMapOpen(true); break;
        case "p": setPlansOpen(true); break;
        case "d": openDrill(); break;
        case "t": openTrain("position"); break;
        case "w": setAthleteOpen(true); break;
        case "j": setJournalOpen(true); break;
        case "i": setInsightsOpen(true); break;
        case "n": setNotesOpen(true); break;
        case "g": setGoalsOpen(true); break;
        case "s": setDashOpen(true); break;
        case "?": setWelcomeOpen(true); break;
        case "f": toggleFav(currentId); break;
        default: break;
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [pos, currentId, mapOpen, plansOpen, drillOpen, settingsOpen, dashOpen, cmdkOpen, trainOpen, athleteOpen, welcomeOpen, journalOpen, insightsOpen, goalsOpen, notesOpen, history]); // eslint-disable-line

  // Flow polish: when the position changes, scroll the content back to the top
  // so each new position opens at its hero, not wherever you last scrolled.
  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTo({ top: 0, behavior: settings.reduceMotion ? "auto" : "smooth" });
  }, [currentId]); // eslint-disable-line

  return (
    <div className={`h-full flex text-slate-200 ${settings.reduceMotion ? "reduce-motion" : ""}`}>
      {/* ============================ SIDEBAR ============================ */}
      <div className={`fixed lg:static inset-y-0 left-0 z-40 w-80 max-w-[85vw] glass border-r border-white/5 transform transition-transform duration-300 ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0"}`}>
        <Archive
          current={currentId}
          query={query}
          setQuery={setQuery}
          onPick={(id) => goTo(id, { viaArchive: true })}
          onClose={() => setSidebarOpen(false)}
          favorites={favorites}
          onToggleFav={toggleFav}
          savedFlows={savedFlows}
          onLoadFlow={loadFlow}
          onDeleteFlow={deleteFlow}
          learned={learned}
          tools={[
            { icon: "🥋", label: "Train", fn: () => { openTrain("position"); setSidebarOpen(false); } },
            { icon: "💪", label: "Athlete", fn: () => { setAthleteOpen(true); setSidebarOpen(false); } },
            { icon: "🎯", label: "Drill", fn: () => { openDrill(); setSidebarOpen(false); } },
            { icon: "🧠", label: "Plans", fn: () => { setPlansOpen(true); setSidebarOpen(false); } },
            { icon: "📒", label: "Journal", fn: () => { setJournalOpen(true); setSidebarOpen(false); } },
            { icon: "💡", label: "Insights", fn: () => { setInsightsOpen(true); setSidebarOpen(false); } },
            { icon: "🏆", label: "Goals", fn: () => { setGoalsOpen(true); setSidebarOpen(false); } },
            { icon: "🗺️", label: "Map", fn: () => { setMapOpen(true); setSidebarOpen(false); } },
            { icon: "📊", label: "Stats", fn: () => { setDashOpen(true); setSidebarOpen(false); } },
            { icon: "📄", label: "Export", fn: () => { exportProgram(); setSidebarOpen(false); } },
            { icon: "⚙️", label: "Settings", fn: () => { setSettingsOpen(true); setSidebarOpen(false); } },
          ]}
        />
      </div>
      {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}

      {/* ============================ MAIN ============================ */}
      <main className="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        {/* Header */}
        <header className="shrink-0 glass border-b border-white/5 px-4 sm:px-6 py-3 flex items-center gap-3">
          <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 rounded-lg bg-ink-700 hover:bg-ink-600">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2.5">
            <div className="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-500 to-emerald-500 flex items-center justify-center font-display font-bold text-white shadow-lg">S</div>
            <div className="leading-tight">
              <div className="font-display font-bold text-white tracking-tight">SubMap</div>
              <div className="text-[10px] text-slate-500 uppercase tracking-widest">BJJ Position Map</div>
            </div>
          </div>
          <div className="ml-auto flex items-center gap-2">
            <button onClick={() => setCmdkOpen(true)} title="Search (⌘/Ctrl K)"
              className="text-sm px-2.5 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5 transition flex items-center gap-1.5">
              🔎 <span className="hidden md:inline text-[11px] text-slate-500">⌘K</span>
            </button>
            <button onClick={() => toggleFav(currentId)} title="Favorite this position"
              className={`text-sm px-2.5 py-1.5 rounded-lg border transition ${isFav ? "bg-amber-500/20 text-amber-300 border-amber-400/40" : "bg-ink-700 hover:bg-ink-600 text-slate-300 border-white/5"}`}>
              {isFav ? "★" : "☆"}
            </button>

            {/* Tools menu — consolidates the labs into one clean dropdown */}
            <div className="relative">
              <button onClick={() => setToolsOpen(o => !o)} title="Tools & labs"
                className={`text-sm px-3 py-1.5 rounded-lg border transition flex items-center gap-1.5 ${toolsOpen ? "bg-indigo-500/25 text-indigo-100 border-indigo-400/40" : "bg-ink-700 hover:bg-ink-600 text-slate-200 border-white/5"}`}>
                🧰 <span className="hidden sm:inline">Tools</span> <span className="text-[10px] text-slate-400">▾</span>
              </button>
              {toolsOpen && (
                <>
                  <div className="fixed inset-0 z-40" onClick={() => setToolsOpen(false)} />
                  <div className="absolute right-0 mt-2 w-60 glass rounded-xl ring-1 ring-white/10 shadow-2xl z-50 p-1.5 max-h-[80vh] overflow-y-auto">
                    {[
                      { title: "Learn", items: [
                        { icon: "🥋", label: "Training Lab", hint: "T", fn: () => openTrain("position") },
                        { icon: "🎴", label: "Study Deck", hint: "", fn: () => openStudy() },
                        { icon: "🎯", label: "Drill & Quiz", hint: "D", fn: () => openDrill() },
                        { icon: "🗺️", label: "Flow Map", hint: "M", fn: () => setMapOpen(true) },
                      ] },
                      { title: "Plan", items: [
                        { icon: "🧠", label: "Game Plans", hint: "P", fn: () => setPlansOpen(true) },
                        { icon: "💡", label: "Insights", hint: "I", fn: () => setInsightsOpen(true) },
                        { icon: "🏆", label: "Goals & Badges", hint: "G", fn: () => setGoalsOpen(true) },
                      ] },
                      { title: "Track", items: [
                        { icon: "📒", label: "Training Journal", hint: "J", fn: () => setJournalOpen(true) },
                        { icon: "📊", label: "Dashboard", hint: "S", fn: () => setDashOpen(true) },
                        { icon: "📝", label: "Notes Hub", hint: "N", fn: () => setNotesOpen(true) },
                      ] },
                      { title: "Tools", items: [
                        { icon: "💪", label: "Athlete · S&C", hint: "W", fn: () => setAthleteOpen(true) },
                        { icon: "⏱️", label: "Round Timer", hint: "", fn: () => setTimerOpen(true) },
                        { icon: "📤", label: "Share Card", hint: "", fn: () => setShareOpen(true) },
                        { icon: "📄", label: "Export / Print", hint: "", fn: exportProgram },
                        { icon: "⚙️", label: "Settings", hint: "", fn: () => setSettingsOpen(true) },
                        { icon: "❓", label: "Guide / intro", hint: "?", fn: () => setWelcomeOpen(true) },
                      ] },
                    ].map(grp => (
                      <div key={grp.title}>
                        <div className="px-3 pt-2 pb-1 text-[10px] font-bold uppercase tracking-widest text-slate-600">{grp.title}</div>
                        {grp.items.map(it => (
                          <button key={it.label} onClick={() => { setToolsOpen(false); it.fn(); }}
                            className="w-full flex items-center gap-3 px-3 py-1.5 rounded-lg text-left hover:bg-ink-700/70 transition">
                            <span className="text-base w-5 text-center">{it.icon}</span>
                            <span className="flex-1 text-sm text-slate-200">{it.label}</span>
                            {it.hint && <kbd className="px-1.5 rounded bg-ink-700 border border-white/10 text-[10px] text-slate-400">{it.hint}</kbd>}
                          </button>
                        ))}
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>

            <button onClick={back} disabled={history.length <= 1}
              className="text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 disabled:opacity-30 disabled:cursor-not-allowed transition flex items-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="hidden sm:inline">Back</span>
            </button>
            <button onClick={reset}
              className="text-sm px-3 py-1.5 rounded-lg bg-indigo-500/20 hover:bg-indigo-500/30 text-indigo-200 border border-indigo-400/30 transition">
              ♻️ <span className="hidden sm:inline">Reset</span>
            </button>
          </div>
        </header>

        {/* Breadcrumb path */}
        <div className="shrink-0 px-4 sm:px-6 py-2.5 border-b border-white/5 bg-ink-900/40 flex items-center gap-3 overflow-x-auto">
          <span className="text-[10px] uppercase tracking-widest text-slate-500 shrink-0">Flow Path</span>
          <Breadcrumb history={history} onJump={jumpTo} />
          {activePlan && (
            <button onClick={() => setPlansOpen(true)} title="Active game plan"
              className="shrink-0 flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full bg-violet-500/15 text-violet-200 border border-violet-400/30 hover:bg-violet-500/25 transition">
              {STYLE_PRESETS[activePlan.style]?.emoji || "🧠"} {activePlan.name}
            </button>
          )}
          <div className="ml-auto shrink-0 flex items-center gap-2">
            {history.length > 1 && (
              <span className={`text-xs px-2.5 py-1 rounded-md font-bold border ${score.finish ? "bg-rose-500/20 text-rose-200 border-rose-400/40" : "bg-emerald-500/15 text-emerald-200 border-emerald-400/30"}`}
                title="Approx. IBJJF points scored along this flow path">
                {score.finish ? "🏁 SUB · WIN" : `🏅 ${score.points} pts`}
              </span>
            )}
            <select value={ruleset} onChange={e => setRuleset(e.target.value)} title="Competition ruleset"
              className="text-xs px-2 py-1 rounded-md bg-ink-700 text-slate-300 border border-white/5 focus:outline-none focus:ring-1 focus:ring-indigo-500/50 max-w-[170px]">
              {Object.keys(RULESETS).map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <button onClick={saveCurrentFlow} disabled={history.length < 2}
              title="Save this flow path"
              className="text-xs px-2.5 py-1 rounded-md bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5 disabled:opacity-30 disabled:cursor-not-allowed transition">
              💾 <span className="hidden sm:inline">Save Flow</span>
            </button>
          </div>
        </div>

        {/* Scrollable content */}
        <div ref={scrollRef} className="flex-1 overflow-y-auto grid-bg">
          <div key={animKey} className="fade-key max-w-5xl mx-auto px-4 sm:px-6 py-6">
            {currentId === "standing" && (
              <TodayWidget profile={profile} sessions={sessions} rolls={rolls} learned={learned} srs={srs} activePlan={activePlan}
                mission={mission} onMissionDone={markMissionDone}
                onStartSession={() => openTrain("session")}
                onFollowPlan={followPlan}
                onLogClass={() => setJournalOpen(true)}
                onAction={onInsightAction} />
            )}
            {/* Position hero */}
            <div className="grid lg:grid-cols-2 gap-5 mb-6">
              {/* Visual — embedded clip if set, otherwise the diagram */}
              <PositionVisual pos={pos} video={getVideo(currentId)}
                searchUrl={resourceLinks(pos)[0].url}
                savedUrl={videos[currentId] || ""}
                onSave={(u) => setVideo(currentId, u)}
                onClear={() => clearVideo(currentId)} />

              {/* Title + gauge + image prompt */}
              <div className="flex flex-col gap-4">
                <div>
                  <div className="flex items-start justify-between gap-3">
                    <h1 className="font-display text-3xl sm:text-4xl font-bold text-white tracking-tight">{pos.name}</h1>
                    <button onClick={() => toggleLearned(currentId)} title="Mark as learned"
                      className={`shrink-0 mt-1 text-xs px-2.5 py-1.5 rounded-lg border transition ${isLearned ? "bg-emerald-500/20 text-emerald-300 border-emerald-400/40" : "bg-ink-700 hover:bg-ink-600 text-slate-400 border-white/5"}`}>
                      {isLearned ? "✓ Learned" : "Mark learned"}
                    </button>
                  </div>
                  <p className="text-slate-400 mt-1.5">{pos.summary}</p>
                  {posIllegal && (
                    <div className="mt-2 text-xs rounded-lg bg-rose-500/10 border border-rose-400/30 text-rose-200 px-3 py-2">
                      ⚠ This position/finish is <b>illegal</b> under <b>{ruleset}</b>. {RULESETS[ruleset].note}
                    </div>
                  )}
                  {incoming.length > 0 && (
                    <div className="mt-3">
                      <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-1.5">Entered from</div>
                      <div className="flex flex-wrap gap-1.5">
                        {incoming.slice(0, 7).map((inc, i) => (
                          <button key={i} onClick={() => goTo(inc.from, { viaArchive: true })}
                            title={`${POSITIONS[inc.from].name}: ${inc.label}`}
                            className="text-[11px] px-2 py-0.5 rounded-full bg-ink-700/70 hover:bg-ink-600 text-slate-300 border border-white/5 transition">
                            {POSITIONS[inc.from].name}
                          </button>
                        ))}
                        {incoming.length > 7 && <span className="text-[11px] text-slate-600 self-center">+{incoming.length - 7} more</span>}
                      </div>
                    </div>
                  )}
                </div>
                <div className="rounded-2xl glass p-4 ring-1 ring-white/5">
                  <RatingGauge rating={pos.rating} />
                </div>
                <div className="rounded-2xl glass p-4 ring-1 ring-white/5">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="text-[11px] uppercase tracking-widest text-slate-500">AI Image Prompt</span>
                    <CopyPrompt text={pos.imagePrompt} />
                  </div>
                  <p className="text-xs text-slate-400 leading-relaxed italic">“{pos.imagePrompt}”</p>
                </div>
              </div>
            </div>

            {/* Description grid */}
            <div className="grid sm:grid-cols-2 gap-4 mb-7">
              <InfoCard icon="🧭" title="Alignment" body={pos.alignment} className="sm:col-span-2" />
              <InfoCard icon="🔺" title="Top / Dominant Objective" body={pos.top} accent="indigo" />
              <InfoCard icon="🔻" title="Bottom / Recovery Objective" body={pos.bottom} accent="emerald" />
              <InfoCard icon="✊" title="Common Grips & Controls" body={pos.grips} className="sm:col-span-2" accent="amber" />
            </div>

            {/* Training focus */}
            <div className="mb-5">
              <TrainingCard id={currentId} onOpen={() => setTrainOpen(true)} />
            </div>

            {/* Notes */}
            <div className="mb-7">
              <NotesCard value={notes[currentId]} onChange={(v) => setNote(currentId, v)} />
            </div>

            {/* Practice quick-actions */}
            <div className="mb-4 flex flex-wrap gap-2">
              <button onClick={() => openDrill(currentId)} className="text-sm px-3 py-1.5 rounded-lg bg-rose-500/15 hover:bg-rose-500/25 text-rose-200 border border-rose-400/30 transition">🎯 Quiz this position</button>
              <button onClick={() => openStudy(pos.group)} className="text-sm px-3 py-1.5 rounded-lg bg-indigo-500/15 hover:bg-indigo-500/25 text-indigo-200 border border-indigo-400/30 transition">🎴 Study {pos.group}</button>
            </div>
            {/* Transitions */}
            <div className="mb-2 flex items-center gap-3 flex-wrap">
              <h2 className="font-display text-lg font-semibold text-white">Available Actions</h2>
              <span className="text-xs text-slate-500">{pos.transitions.length} transitions — click to freeze & pivot{activePlan ? " · 📌 to set your go-to" : ""}</span>
            </div>
            {activePlan && plannedLabel && (
              <div className="mb-3 flex items-center gap-2 text-sm rounded-xl bg-amber-400/10 border border-amber-400/30 px-3 py-2">
                <span className="text-amber-300 font-semibold">★ Your A-game here:</span>
                <span className="text-amber-100">{plannedLabel}</span>
              </div>
            )}
            <div className="grid sm:grid-cols-2 gap-3 pb-10">
              {pos.transitions.map((t, i) => (
                <TransitionCard key={i} t={t} onClick={() => goTo(t.to)}
                  planActive={!!activePlan}
                  planned={!!activePlan && activePlan.picks[currentId] === t.label}
                  onTogglePlan={() => setPick(currentId, t.label)}
                  points={actionPoints(t)}
                  illegal={isIllegal(t.to, ruleset)}
                  showPoints={settings.showPoints}
                  hotkey={i < 9 ? String(i + 1) : null} />
              ))}
            </div>
          </div>
        </div>
      </main>

      {mapOpen && <MapGraph current={currentId} onClose={() => setMapOpen(false)}
        onPick={(id) => { goTo(id, { viaArchive: true }); setMapOpen(false); }} />}

      {plansOpen && <GamePlanModal
        plans={plans} activeId={activePlanId} active={activePlan}
        onCreate={createPlan} onDelete={deletePlan} onSetActive={setActivePlanId}
        onClearPick={clearPick} onFollow={followPlan} onExport={exportPlan}
        onJump={(id) => { goTo(id, { viaArchive: true }); setPlansOpen(false); }}
        onClose={() => setPlansOpen(false)} />}

      {drillOpen && <DrillModal activePlan={activePlan} srs={srs} drillAgg={drillAgg} focusId={drillFocus} onRecord={recordDrill}
        onJump={(id) => { goTo(id, { viaArchive: true }); setDrillOpen(false); }}
        onClose={() => setDrillOpen(false)} />}

      {cmdkOpen && <CommandPalette
        commands={[
          { icon: "🥋", label: "Training Lab", run: () => openTrain("position") },
          { icon: "🎴", label: "Study Deck", run: () => openStudy() },
          { icon: "🎯", label: "Drill & Quiz", run: () => openDrill() },
          { icon: "💪", label: "Athlete · S&C", run: () => setAthleteOpen(true) },
          { icon: "🧠", label: "Game Plans", run: () => setPlansOpen(true) },
          { icon: "🗺️", label: "Flow Map", run: () => setMapOpen(true) },
          { icon: "💡", label: "Insights", run: () => setInsightsOpen(true) },
          { icon: "🏆", label: "Goals & Badges", run: () => setGoalsOpen(true) },
          { icon: "📒", label: "Training Journal", run: () => setJournalOpen(true) },
          { icon: "📝", label: "Notes Hub", run: () => setNotesOpen(true) },
          { icon: "⏱️", label: "Round Timer", run: () => setTimerOpen(true) },
          { icon: "📤", label: "Share Card", run: () => setShareOpen(true) },
          { icon: "📊", label: "Dashboard", run: () => setDashOpen(true) },
          { icon: "📄", label: "Export / Print program", run: () => exportProgram() },
          { icon: "⚙️", label: "Settings", run: () => setSettingsOpen(true) },
          { icon: "❓", label: "Guide / intro", run: () => setWelcomeOpen(true) },
          { icon: "▶️", label: "Follow my game plan", run: () => followPlan() },
          { icon: "↩️", label: "Back", run: () => back() },
          { icon: "♻️", label: "Reset to standing", run: () => reset() },
        ]}
        onPick={(id) => { goTo(id, { viaArchive: true }); setCmdkOpen(false); }}
        onClose={() => setCmdkOpen(false)} />}

      {settingsOpen && <SettingsModal settings={settings} onChange={setSettings} onClose={() => setSettingsOpen(false)} />}

      {dashOpen && <DashboardModal learned={learned} favorites={favorites} savedFlows={savedFlows}
        plans={plans} activePlan={activePlan} drillAgg={drillAgg} sessions={sessions} rolls={rolls} onExport={exportProgram}
        onJump={(id) => { goTo(id, { viaArchive: true }); setDashOpen(false); }}
        onClose={() => setDashOpen(false)} />}

      {trainOpen && <TrainingModal currentId={currentId} activePlan={activePlan} defaultStyle={activePlan ? activePlan.style : null} defaultTab={trainTab}
        onJump={(id) => { goTo(id, { viaArchive: true }); setTrainOpen(false); }}
        onOpenAthlete={() => { setTrainOpen(false); setAthleteOpen(true); }}
        onLogSession={logSession}
        onClose={() => setTrainOpen(false)} />}

      {athleteOpen && <ConditioningModal onClose={() => setAthleteOpen(false)} />}

      {welcomeOpen && <WelcomeModal onClose={dismissWelcome} />}

      {journalOpen && <JournalModal profile={profile} setProfile={setProfile} entries={sessions}
        onLog={addLog} onDelete={deleteSession}
        promotions={promotions} onAddPromotion={addPromotion} onDeletePromotion={deletePromotion}
        rolls={rolls} onAddRoll={addRoll} onDeleteRoll={deleteRoll}
        comps={comps} onAddComp={addComp} onDeleteComp={deleteComp}
        onClose={() => setJournalOpen(false)} />}

      {insightsOpen && <InsightsModal sessions={sessions} rolls={rolls} learned={learned} srs={srs}
        drillAgg={drillAgg} activePlan={activePlan} profile={profile}
        onAction={onInsightAction} onClose={() => setInsightsOpen(false)} />}

      {goalsOpen && <GoalsModal sessions={sessions} rolls={rolls} learned={learned} drillAgg={drillAgg}
        plans={plans} activePlan={activePlan} promotions={promotions} profile={profile} goals={goals}
        onAddGoal={addGoal} onRemoveGoal={removeGoal} onSetTarget={setGoalTarget} onClose={() => setGoalsOpen(false)} />}

      {shareOpen && <ShareModal sessions={sessions} rolls={rolls} learned={learned} drillAgg={drillAgg}
        plans={plans} activePlan={activePlan} promotions={promotions} comps={comps} profile={profile}
        onClose={() => setShareOpen(false)} />}

      {timerOpen && <TimerModal onClose={() => setTimerOpen(false)} />}

      {notesOpen && <NotesHubModal notes={notes} onJump={(id) => { goTo(id, { viaArchive: true }); setNotesOpen(false); }} onClose={() => setNotesOpen(false)} />}

      {studyOpen && <StudyModal learned={learned} favorites={favorites} initialScope={studyScope} onToggleLearned={toggleLearned} onJump={(id) => { goTo(id, { viaArchive: true }); setStudyOpen(false); }} onClose={() => setStudyOpen(false)} />}
    </div>
  );
}

function InfoCard({ icon, title, body, className = "", accent }) {
  const accents = {
    indigo: "from-indigo-500/10", emerald: "from-emerald-500/10",
    amber: "from-amber-500/10", default: "from-white/5",
  };
  return (
    <div className={`rounded-2xl glass ring-1 ring-white/5 p-4 bg-gradient-to-br ${accents[accent] || accents.default} to-transparent ${className}`}>
      <div className="flex items-center gap-2 mb-1.5">
        <span className="text-base">{icon}</span>
        <h3 className="text-[11px] font-bold uppercase tracking-widest text-slate-400">{title}</h3>
      </div>
      <p className="text-sm text-slate-300 leading-relaxed">{body}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
