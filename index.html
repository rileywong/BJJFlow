  <!--
  ============================================================================
   BJJFlow  ·  An Endless Brazilian Jiu-Jitsu Position Flow Tree
  ============================================================================
   A single, self-contained HTML file. No build step. Open it in any browser.

   Stack:
     - React 18 (UMD via CDN)
     - Babel Standalone (in-browser JSX transpile)
     - Tailwind CSS (Play CDN) + a small custom CSS layer
     - 100% inline data — the entire BJJ "web" lives in the POSITIONS object.

   How it works:
     - State starts at "standing" (both players neutral / on the feet).
     - Each position lists "transitions": clickable Action nodes that FREEZE
       the current state and PIVOT into a new position.
     - A searchable Archive sidebar lets you jump directly to ANY position.
     - Every position renders: a stylized SVG mat scene, a description
       (alignment + top/bottom objectives + common grips), a positional
       Advantage gauge (-5 .. +5), and an AI image-generation prompt you can
       copy to batch-generate real photos later.

  ============================================================================
   IMAGE GENERATION PROMPTS  (swap the SVG scenes for real renders later)
  ============================================================================
   Each prompt below maps 1:1 to a position id. Recommended global style
   prefix for batch generation to keep a consistent look:

     "High-definition studio photograph, two Brazilian Jiu-Jitsu athletes,
      one in a navy-blue gi and one in a white gi, clean light-grey seamless
      background, soft cinematic key light, shot on 50mm, shallow depth of
      field, crisp focus, instructional clarity --ar 4:3"

   Per-position subject:
     standing            -> "...both athletes standing in a neutral collar-and-elbow tie-up, balanced fighting stance, about to engage."
     closed-guard-bottom -> "...bottom athlete on his back with legs locked around the top athlete's waist (closed guard), gripping collar and sleeve, breaking posture."
     closed-guard-top    -> "...top athlete kneeling inside a closed guard, posture upright, hands controlling the bottom athlete's hips, preparing to open and pass."
     dlr-bottom          -> "...bottom athlete playing De La Riva open guard, outside hook wrapped around the top athlete's lead leg, gripping the heel and sleeve."
     spider-bottom       -> "...bottom athlete playing spider guard, both feet on the top athlete's biceps, arms extended controlling both sleeves, tension in the legs."
     butterfly-bottom    -> "...bottom athlete seated in butterfly guard, both hooks inside the top athlete's thighs, underhook and body-lock, loading for an elevation sweep."
     half-top            -> "...top athlete in half guard on top with a strong cross-face and underhook, flattening the bottom athlete, one leg trapped."
     half-bottom         -> "...bottom athlete in half guard with a deep underhook and knee-shield, on his side, fighting to come up to the back or sweep."
     deep-half-bottom    -> "...bottom athlete in deep half guard, burrowed underneath the top athlete hugging one leg, head to the inside, off-balancing for a waiter sweep."
     side-top            -> "...top athlete in side control with a tight cross-face and far-side underhook, chest-to-chest pressure, hips low and heavy."
     side-bottom         -> "...bottom athlete defending side control, near elbow framing into the hip and forearm into the neck, shrimping to recover guard."
     mount-top           -> "...top athlete in full mount, knees high under the armpits, upright posture, hands posted, isolating an arm for an attack."
     mount-bottom        -> "...bottom athlete mounted, bridging hard onto one shoulder while trapping an arm and leg, executing an upa escape."
     back-attacker       -> "...attacker on the opponent's back with both hooks in and a seatbelt grip, chest sealed to the back, sliding the choking arm under the chin."
     back-defender       -> "...defender escaping back control, chin tucked, two hands fighting the choking wrist, shoulder-walking toward the mat to slide out."
     turtle-top          -> "...top athlete attacking a turtled opponent, chest on the back with a near-side seatbelt and waist grip, threatening to insert hooks."
     turtle-bottom       -> "...bottom athlete in a tight defensive turtle, elbows and knees connected, protecting the neck, ready to granby roll or stand up."
     sub-rnc             -> "...attacker finishing a rear naked choke from back control, both hooks in, choking arm under the chin, second hand behind the head, opponent tapping."
     sub-armbar          -> "...attacker finishing a juji-gatame armbar, hips raised, opponent's arm extended thumb-up between the thighs."
     sub-triangle        -> "...bottom athlete finishing a triangle choke from guard, legs figure-foured around the opponent's neck and one arm, pulling the head down."
     sub-kimura          -> "...attacker finishing a kimura shoulder lock, figure-four grip on the wrist, rotating the opponent's arm behind the back."
     sub-collar-choke    -> "...top athlete finishing a cross-collar choke from mount, both hands deep in the lapels, elbows flaring, opponent tapping."
     sub-guillotine      -> "...attacker finishing a guillotine choke, opponent's head trapped under the armpit, choking arm under the chin, pulling up with a high elbow."
  ============================================================================
  -->

// Helper: every submission is a terminal "finish" node that resets to standing.
function subNode(id, name, desc, imagePrompt) {
  return {
    id, name, group: "Submissions", rating: 10, layout: "submission", perspective: "top",
    summary: desc,
    alignment: desc,
    top: "Finish the submission with control — secure the tap.",
    bottom: "Too late to defend from here. In live training, tap early and reset.",
    grips: "See the position this submission was entered from.",
    imagePrompt,
    transitions: [
      { label: "Reset to Standing", kind: "reset", detail: "Start a new flow from the neutral standing position.", to: "standing" },
    ],
  };
}

function RatingGauge({ rating }) {
  const isSub = rating >= 10;
  const clamped = Math.max(-5, Math.min(5, rating));
  const pct = ((clamped + 5) / 10) * 100; // 0..100
  const color =
    isSub ? "#fb7185" :
    rating > 2 ? "#34d399" :
    rating > 0 ? "#86efac" :
    rating === 0 ? "#fbbf24" :
    rating > -3 ? "#fb923c" : "#f87171";
  const label =
    isSub ? "Finish" :
    rating >= 4 ? "Dominant" :
    rating > 0 ? "Advantage" :
    rating === 0 ? "Neutral" :
    rating > -4 ? "Disadvantage" : "Critical";

  return (
    <div className="w-full">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs uppercase tracking-widest text-slate-400">Positional Advantage</span>
        <span className="text-sm font-semibold" style={{ color }}>
          {isSub ? "★ Submission" : `${rating > 0 ? "+" : ""}${rating} · ${label}`}
        </span>
      </div>
      <div className="relative h-3 rounded-full bg-ink-700 overflow-hidden">
        <div className="absolute inset-0" style={{
          background: "linear-gradient(90deg, #ef4444 0%, #f59e0b 30%, #fbbf24 50%, #84cc16 70%, #10b981 100%)",
          opacity: 0.35
        }} />
        {/* center tick */}
        <div className="absolute top-0 bottom-0 left-1/2 w-px bg-white/25" />
        {/* marker */}
        <div
          className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 h-5 w-5 rounded-full border-2 border-ink-950 shadow-lg transition-all duration-500"
          style={{ left: `${pct}%`, background: color, boxShadow: `0 0 14px ${color}` }}
        />
      </div>
      <div className="flex justify-between mt-1 text-[10px] text-slate-500 font-medium">
        <span>−5 Worst</span><span>0 Neutral</span><span>+5 Best</span>
      </div>
    </div>
  );
}

function TransitionCard({ t, onClick, planned, planActive, onTogglePlan }) {
  const meta = KIND_META[t.kind] || KIND_META.transition;
  const target = POSITIONS[t.to];
  return (
    <div
      onClick={onClick}
      className={`node-card group relative cursor-pointer text-left w-full rounded-2xl glass ring-1 ${planned ? "ring-2 ring-amber-400/70 bg-amber-400/5" : meta.ring} hover:ring-2 p-4 hover:bg-ink-700/40`}

function RatingPip({ rating }) {
  const isSub = rating >= 10;
  const color =
    isSub ? "#fb7185" :
    rating > 2 ? "#34d399" :
    rating > 0 ? "#86efac" :
    rating === 0 ? "#fbbf24" :
    rating > -3 ? "#fb923c" : "#f87171";
  return (
    <span className="shrink-0 inline-flex items-center justify-center h-7 w-7 rounded-lg text-[11px] font-bold"
      style={{ background: `${color}22`, color, border: `1px solid ${color}44` }}>
      {isSub ? "★" : (rating > 0 ? `+${rating}` : rating)}
    </span>
  );
}

function countTransitions() {
  return Object.values(POSITIONS).reduce((n, p) => n + p.transitions.length, 0);
}

function Breadcrumb({ history, onJump }) {
  return (
    <div className="flex items-center gap-1.5 flex-wrap text-xs">
      {history.map((id, i) => {
        const p = POSITIONS[id];
        const last = i === history.length - 1;
        return (
          <React.Fragment key={i}>
            {i > 0 && <span className="text-slate-600">/</span>}
            <button
              onClick={() => onJump(i)}
              className={`px-2 py-0.5 rounded-md transition ${last ? "bg-indigo-500/20 text-indigo-200 font-medium" : "text-slate-400 hover:text-slate-200 hover:bg-ink-700"}`}
            >
              {p ? p.name : id}
            </button>
          </React.Fragment>
        );
      })}
    </div>
  );
}

// Shared rating -> color helper (used by gauge, pips, and the map).
function ratingColor(rating) {
  if (rating >= 10) return "#fb7185";
  if (rating > 2)   return "#34d399";
  if (rating > 0)   return "#86efac";
  if (rating === 0) return "#fbbf24";
  if (rating > -3)  return "#fb923c";
  return "#f87171";
}

// Persist any JSON-serializable state to localStorage.
function useLocalStorage(key, initial) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch (e) { return initial; }
  });
  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }, [key, val]);
  return [val, setVal];
}

//////////////////////////////////////////////////////////////////////////////
//  GLOBAL MAP — the whole tree at a glance (tech-tree overview)
//  Columns = groups, x-ordered; nodes colored by rating; edges = transitions.
//  Hover a node to spotlight its 1-hop neighborhood; click to navigate.
//////////////////////////////////////////////////////////////////////////////

function MapGraph({ current, onPick, onClose }) {
  const [hover, setHover] = React.useState(null);
  const COLW = 158, X0 = 90, Y0 = 78, ROWH = 66;

  const cols = GROUP_ORDER.map(g => Object.values(POSITIONS).filter(p => p.group === g));
  const coord = {};
  cols.forEach((items, ci) => items.forEach((p, ri) => { coord[p.id] = { x: X0 + ci * COLW, y: Y0 + ri * ROWH }; }));
  const width = X0 + cols.length * COLW;
  const maxRows = Math.max(...cols.map(c => c.length));
  const height = Y0 + maxRows * ROWH + 20;

  const edges = [];
  Object.values(POSITIONS).forEach(p => p.transitions.forEach(t => {
    if (coord[t.id] && t.id !== p.id) edges.push({ from: p.id, to: t.id });
  }));

  const focus = hover;
  const neighbors = new Set();
  if (focus) {
    POSITIONS[focus].transitions.forEach(t => neighbors.add(t.id));
    Object.values(POSITIONS).forEach(p => p.transitions.forEach(t => { if (t.id === focus) neighbors.add(p.id); }));
    neighbors.add(focus);
  }
  const lit = (id) => !focus || neighbors.has(id);
  const litEdge = (e) => !focus || e.from === focus || e.to === focus;

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-ink-950/80 backdrop-blur-sm">
      <div className="shrink-0 glass border-b border-white/10 px-5 py-3 flex items-center gap-3">
        <span className="text-lg">🗺️</span>
        <h2 className="font-display font-semibold text-white">Flow Map — the whole tree</h2>
        <span className="hidden sm:block text-xs text-slate-500">hover to spotlight a position's connections · click to jump</span>
        <button onClick={onClose} className="ml-auto text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200">Close ✕</button>
      </div>
      <div className="flex-1 overflow-auto p-4">
        <svg width={width} height={height} className="mx-auto" style={{ minWidth: width }}>
          {/* group headers */}
          {GROUP_ORDER.map((g, ci) => (
            <text key={g} x={X0 + ci * COLW} y={34} textAnchor="middle"
              className="fill-slate-500" style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase" }}>
              {g}
            </text>
          ))}
          {/* edges */}
          {edges.map((e, i) => {
            const a = coord[e.from], b = coord[e.to];
            const active = focus && (e.from === focus || e.to === focus);
            return (
              <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={active ? "rgba(129,140,248,.8)" : "rgba(148,163,184,.13)"}
                strokeWidth={active ? 1.8 : 1}
                opacity={litEdge(e) ? 1 : 0.15} />
            );
          })}
          {/* nodes */}
          {Object.values(POSITIONS).map(p => {
            const c = coord[p.id];
            const col = ratingColor(p.rating);
            const isCur = p.id === current;
            const r = isCur ? 21 : 16;
            const short = p.name.length > 21 ? p.name.slice(0, 20) + "…" : p.name;
            return (
              <g key={p.id} style={{ cursor: "pointer" }} opacity={lit(p.id) ? 1 : 0.2}
                onMouseEnter={() => setHover(p.id)} onMouseLeave={() => setHover(null)}
                onClick={() => onPick(p.id)}>
                {isCur && <circle cx={c.x} cy={c.y} r={r + 5} fill="none" stroke={col} strokeWidth="1.5" opacity=".5" />}
                <circle cx={c.x} cy={c.y} r={r} fill={col + "26"} stroke={col} strokeWidth={isCur ? 3 : 1.6} />
                <text x={c.x} y={c.y + 3.5} textAnchor="middle" style={{ fontSize: 10, fontWeight: 700 }} fill={col}>
                  {p.rating >= 10 ? "★" : (p.rating > 0 ? "+" + p.rating : p.rating)}
                </text>
                <text x={c.x} y={c.y + r + 12} textAnchor="middle" style={{ fontSize: 8.5 }} className="fill-slate-300">
                  {short}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

  const plannedLabel = activePlan ? activePlan.picks[currentId] : null;

  const updateActivePlan = (mut) =>
    setPlans(ps => ps.map(p => (p.id === activePlanId ? mut(p) : p)));

  const setPick = (posId, label) => {
    if (!activePlan) return;
    updateActivePlan(p => {
      const picks = { ...p.picks };
      if (picks[posId] === label) delete picks[posId];
      else picks[posId] = label;
      return { ...p, picks };
    });
  };
  const clearPick = (posId) =>
    updateActivePlan(p => { const picks = { ...p.picks }; delete picks[posId]; return { ...p, picks }; });

  const createPlan = (name, style) => {
    const preset = STYLE_PRESETS[style] || { picks: {} };
    const id = Date.now();
    const plan = { id, name: (name && name.trim()) || style, style, picks: { ...preset.picks } };
    setPlans(ps => [plan, ...ps]);
    setActivePlanId(id);
  };
  const deletePlan = (id) => {
    setPlans(ps => ps.filter(p => p.id !== id));
    if (activePlanId === id) setActivePlanId(null);
  };
  const followPlan = () => {
    if (!activePlan) return;
    const chain = ["standing"]; const seen = new Set(["standing"]); let cur = "standing";
    for (let i = 0; i < 60; i++) {
      const label = activePlan.picks[cur];
      if (!label) break;
      const tr = (POSITIONS[cur].transitions || []).find(t => t.label === label);
      if (!tr) break;
      chain.push(tr.to);
      if (seen.has(tr.to) || POSITIONS[tr.to].group === "Submissions") break;
      seen.add(tr.to); cur = tr.to;
    }
    setHistory(chain); setAnimKey(k => k + 1); setPlansOpen(false);
  };
  const setNote = (posId, text) => setNotes(n => ({ ...n, [posId]: text }));

  const toggleFav = (id) =>
    setFavorites(f => f.includes(id) ? f.filter(x => x !== id) : [...f, id]);

  const saveCurrentFlow = () => {
    if (history.length < 2) return;
    const entry = {
      id: Date.now(),
      path: [...history],
      label: `${POSITIONS[history[0]].name} → ${POSITIONS[currentId].name}`,
      steps: history.length,
    };
    setSavedFlows(s => [entry, ...s].slice(0, 25));
  };
  const loadFlow = (path) => {
    const clean = path.filter(id => POSITIONS[id]);
    if (clean.length) { setHistory(clean); setAnimKey(k => k + 1); setSidebarOpen(false); }
  };
  const deleteFlow = (id) => setSavedFlows(s => s.filter(e => e.id !== id));

  const goTo = (id, { viaArchive = false } = {}) => {
    if (!POSITIONS[id]) return;
    setHistory(h => (viaArchive ? [...h, id] : [...h, id]));
    setAnimKey(k => k + 1);
    setSidebarOpen(false);
  };

  const jumpTo = (index) => {
    setHistory(h => h.slice(0, index + 1));
    setAnimKey(k => k + 1);
  };

  const back = () => {
    if (history.length > 1) { setHistory(h => h.slice(0, -1)); setAnimKey(k => k + 1); }
  };

  const reset = () => { setHistory(["standing"]); setAnimKey(k => k + 1); };

  return (
    <div className="h-full flex text-slate-200">
      {/* ============================ SIDEBAR ============================ */}
      <div className={`fixed lg:static inset-y-0 left-0 z-40 w-80 max-w-[85vw] glass border-r border-white/5 transform transition-transform duration-300 ${sidebarOpen ? "translate-x-0" : "-translate-x-full lg:translate-x-0"}`}>
        <Archive
          current={currentId}
          query={query}
          setQuery={setQuery}
          onPick={(id) => goTo(id, { viaArchive: true })}
          onClose={() => setSidebarOpen(false)}
          favorites={favorites}
          onToggleFav={toggleFav}
          savedFlows={savedFlows}
          onLoadFlow={loadFlow}
          onDeleteFlow={deleteFlow}
        />
      </div>
      {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}

      {/* ============================ MAIN ============================ */}
      <main className="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        {/* Header */}
        <header className="shrink-0 glass border-b border-white/5 px-4 sm:px-6 py-3 flex items-center gap-3">
          <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 rounded-lg bg-ink-700 hover:bg-ink-600">
            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2.5">
            <div className="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-500 to-emerald-500 flex items-center justify-center font-display font-bold text-white shadow-lg">B</div>
            <div className="leading-tight">
              <div className="font-display font-bold text-white tracking-tight">BJJFlow</div>
              <div className="text-[10px] text-slate-500 uppercase tracking-widest">Position Flow Tree</div>
            </div>
          </div>
          <div className="ml-auto flex items-center gap-2">
            <button onClick={() => toggleFav(currentId)} title="Favorite this position"
              className={`text-sm px-2.5 py-1.5 rounded-lg border transition ${isFav ? "bg-amber-500/20 text-amber-300 border-amber-400/40" : "bg-ink-700 hover:bg-ink-600 text-slate-300 border-white/5"}`}>
              {isFav ? "★" : "☆"}
            </button>
            <button onClick={() => setPlansOpen(true)} title="Game plans"
              className="text-sm px-3 py-1.5 rounded-lg bg-violet-500/15 hover:bg-violet-500/25 text-violet-200 border border-violet-400/30 transition">
              🧠 <span className="hidden sm:inline">Plans</span>
            </button>
            <button onClick={() => setMapOpen(true)} title="Open the flow map"
              className="text-sm px-3 py-1.5 rounded-lg bg-emerald-500/15 hover:bg-emerald-500/25 text-emerald-200 border border-emerald-400/30 transition">
              🗺️ <span className="hidden sm:inline">Map</span>
            </button>
            <button onClick={back} disabled={history.length <= 1}
              className="text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 disabled:opacity-30 disabled:cursor-not-allowed transition flex items-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="hidden sm:inline">Back</span>
            </button>
            <button onClick={reset}
              className="text-sm px-3 py-1.5 rounded-lg bg-indigo-500/20 hover:bg-indigo-500/30 text-indigo-200 border border-indigo-400/30 transition">
              ♻️ <span className="hidden sm:inline">Reset</span>
            </button>
          </div>
        </header>

        {/* Breadcrumb path */}
        <div className="shrink-0 px-4 sm:px-6 py-2.5 border-b border-white/5 bg-ink-900/40 flex items-center gap-3 overflow-x-auto">
          <span className="text-[10px] uppercase tracking-widest text-slate-500 shrink-0">Flow Path</span>
          <Breadcrumb history={history} onJump={jumpTo} />
          {activePlan && (
            <button onClick={() => setPlansOpen(true)} title="Active game plan"
              className="shrink-0 flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full bg-violet-500/15 text-violet-200 border border-violet-400/30 hover:bg-violet-500/25 transition">
              {STYLE_PRESETS[activePlan.style]?.emoji || "🧠"} {activePlan.name}
            </button>
          )}
          <button onClick={saveCurrentFlow} disabled={history.length < 2}
            title="Save this flow path"
            className="ml-auto shrink-0 text-xs px-2.5 py-1 rounded-md bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5 disabled:opacity-30 disabled:cursor-not-allowed transition">
            💾 <span className="hidden sm:inline">Save Flow</span>
          </button>
        </div>

        {/* Scrollable content */}
        <div className="flex-1 overflow-y-auto grid-bg">
          <div key={animKey} className="fade-key max-w-5xl mx-auto px-4 sm:px-6 py-6">
            {/* Position hero */}
            <div className="grid lg:grid-cols-2 gap-5 mb-6">
              {/* Visual */}
              <div className="rounded-3xl glass overflow-hidden ring-1 ring-white/5">
                <div className="aspect-[5/3] relative">
                  <MatScene layout={pos.layout} />
                  <div className="absolute top-3 left-3 flex items-center gap-2">
                    <span className="px-2.5 py-1 rounded-full bg-black/40 backdrop-blur text-[11px] font-medium text-slate-200 border border-white/10">
                      {pos.group}
                    </span>
                    {pos.perspective !== "neutral" && (
                      <span className="px-2.5 py-1 rounded-full bg-black/40 backdrop-blur text-[11px] font-medium border border-white/10"
                        style={{ color: pos.perspective === "top" ? "#5b7cfa" : "#e7ebf5" }}>
                        {pos.perspective === "top" ? "▲ Top POV" : "▼ Bottom POV"}
                      </span>
                    )}
                  </div>
                  <div className="absolute bottom-0 inset-x-0 p-3 bg-gradient-to-t from-ink-950/90 to-transparent">
                    <div className="flex items-center gap-2 text-[11px] text-slate-400">
                      <span className="h-2 w-2 rounded-full bg-indigo-400 pulse-dot"/> Stylized scene · swap for AI render
                    </div>
                  </div>
                </div>
              </div>

              {/* Title + gauge + image prompt */}
              <div className="flex flex-col gap-4">
                <div>
                  <h1 className="font-display text-3xl sm:text-4xl font-bold text-white tracking-tight">{pos.name}</h1>
                  <p className="text-slate-400 mt-1.5">{pos.summary}</p>
                </div>
                <div className="rounded-2xl glass p-4 ring-1 ring-white/5">
                  <RatingGauge rating={pos.rating} />
                </div>
                <div className="rounded-2xl glass p-4 ring-1 ring-white/5">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="text-[11px] uppercase tracking-widest text-slate-500">AI Image Prompt</span>
                    <CopyPrompt text={pos.imagePrompt} />
                  </div>
                  <p className="text-xs text-slate-400 leading-relaxed italic">“{pos.imagePrompt}”</p>
                </div>
              </div>
            </div>

            {/* Description grid */}
            <div className="grid sm:grid-cols-2 gap-4 mb-7">
              <InfoCard icon="🧭" title="Alignment" body={pos.alignment} className="sm:col-span-2" />
              <InfoCard icon="🔺" title="Top / Dominant Objective" body={pos.top} accent="indigo" />
              <InfoCard icon="🔻" title="Bottom / Recovery Objective" body={pos.bottom} accent="emerald" />
              <InfoCard icon="✊" title="Common Grips & Controls" body={pos.grips} className="sm:col-span-2" accent="amber" />
            </div>

            {/* Notes */}
            <div className="mb-7">
              <NotesCard value={notes[currentId]} onChange={(v) => setNote(currentId, v)} />
            </div>

            {/* Transitions */}
            <div className="mb-2 flex items-center gap-3 flex-wrap">
              <h2 className="font-display text-lg font-semibold text-white">Available Actions</h2>
              <span className="text-xs text-slate-500">{pos.transitions.length} transitions — click to freeze & pivot{activePlan ? " · 📌 to set your go-to" : ""}</span>
            </div>
            {activePlan && plannedLabel && (
              <div className="mb-3 flex items-center gap-2 text-sm rounded-xl bg-amber-400/10 border border-amber-400/30 px-3 py-2">
                <span className="text-amber-300 font-semibold">★ Your A-game here:</span>
                <span className="text-amber-100">{plannedLabel}</span>
              </div>
            )}
            <div className="grid sm:grid-cols-2 gap-3 pb-10">
              {pos.transitions.map((t, i) => (
                <TransitionCard key={i} t={t} onClick={() => goTo(t.to)}
                  planActive={!!activePlan}
                  planned={!!activePlan && activePlan.picks[currentId] === t.label}
                  onTogglePlan={() => setPick(currentId, t.label)} />
              ))}
            </div>
          </div>
        </div>
      </main>

      {mapOpen && <MapGraph current={currentId} onClose={() => setMapOpen(false)}
        onPick={(id) => { goTo(id, { viaArchive: true }); setMapOpen(false); }} />}

      {plansOpen && <GamePlanModal
        plans={plans} activeId={activePlanId} active={activePlan}
        onCreate={createPlan} onDelete={deletePlan} onSetActive={setActivePlanId}
        onClearPick={clearPick} onFollow={followPlan}
        onJump={(id) => { goTo(id, { viaArchive: true }); setPlansOpen(false); }}
        onClose={() => setPlansOpen(false)} />}
    </div>
  );
}

function InfoCard({ icon, title, body, className = "", accent }) {
  const accents = {
    indigo: "from-indigo-500/10", emerald: "from-emerald-500/10",
    amber: "from-amber-500/10", default: "from-white/5",
  };
  return (
    <div className={`rounded-2xl glass ring-1 ring-white/5 p-4 bg-gradient-to-br ${accents[accent] || accents.default} to-transparent ${className}`}>
      <div className="flex items-center gap-2 mb-1.5">
        <span className="text-base">{icon}</span>
        <h3 className="text-[11px] font-bold uppercase tracking-widest text-slate-400">{title}</h3>
      </div>
      <p className="text-sm text-slate-300 leading-relaxed">{body}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
