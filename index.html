  <!--
  ============================================================================
   SubMap  ·  An Endless Brazilian Jiu-Jitsu Position & Submission Map
  ============================================================================
   A single, self-contained HTML file. No build step. Open it in any browser.

   Stack:
     - React 18 (UMD via CDN)
     - Babel Standalone (in-browser JSX transpile)
     - Tailwind CSS (Play CDN) + a small custom CSS layer
     - 100% inline data — the entire BJJ "web" lives in the POSITIONS object.

   How it works:
     - State starts at "standing" (both players neutral / on the feet).
     - Each position lists "transitions": clickable Action nodes that FREEZE
       the current state and PIVOT into a new position.
     - A searchable Archive sidebar lets you jump directly to ANY position.
     - Every position renders: a stylized SVG mat scene, a description
       (alignment + top/bottom objectives + common grips), a positional
       Advantage gauge (-5 .. +5), and an AI image-generation prompt you can
       copy to batch-generate real photos later.

  ============================================================================
   IMAGE GENERATION PROMPTS  (swap the SVG scenes for real renders later)
  ============================================================================
   Each prompt below maps 1:1 to a position id. Recommended global style
   prefix for batch generation to keep a consistent look:

     "High-definition studio photograph, two Brazilian Jiu-Jitsu athletes,
      one in a navy-blue gi and one in a white gi, clean light-grey seamless
      background, soft cinematic key light, shot on 50mm, shallow depth of
      field, crisp focus, instructional clarity --ar 4:3"

   Per-position subject:
     standing            -> "...both athletes standing in a neutral collar-and-elbow tie-up, balanced fighting stance, about to engage."
     closed-guard-bottom -> "...bottom athlete on his back with legs locked around the top athlete's waist (closed guard), gripping collar and sleeve, breaking posture."
     closed-guard-top    -> "...top athlete kneeling inside a closed guard, posture upright, hands controlling the bottom athlete's hips, preparing to open and pass."
     dlr-bottom          -> "...bottom athlete playing De La Riva open guard, outside hook wrapped around the top athlete's lead leg, gripping the heel and sleeve."
     spider-bottom       -> "...bottom athlete playing spider guard, both feet on the top athlete's biceps, arms extended controlling both sleeves, tension in the legs."
     butterfly-bottom    -> "...bottom athlete seated in butterfly guard, both hooks inside the top athlete's thighs, underhook and body-lock, loading for an elevation sweep."
     half-top            -> "...top athlete in half guard on top with a strong cross-face and underhook, flattening the bottom athlete, one leg trapped."
     half-bottom         -> "...bottom athlete in half guard with a deep underhook and knee-shield, on his side, fighting to come up to the back or sweep."
     deep-half-bottom    -> "...bottom athlete in deep half guard, burrowed underneath the top athlete hugging one leg, head to the inside, off-balancing for a waiter sweep."
     side-top            -> "...top athlete in side control with a tight cross-face and far-side underhook, chest-to-chest pressure, hips low and heavy."
     side-bottom         -> "...bottom athlete defending side control, near elbow framing into the hip and forearm into the neck, shrimping to recover guard."
     mount-top           -> "...top athlete in full mount, knees high under the armpits, upright posture, hands posted, isolating an arm for an attack."
     mount-bottom        -> "...bottom athlete mounted, bridging hard onto one shoulder while trapping an arm and leg, executing an upa escape."
     back-attacker       -> "...attacker on the opponent's back with both hooks in and a seatbelt grip, chest sealed to the back, sliding the choking arm under the chin."
     back-defender       -> "...defender escaping back control, chin tucked, two hands fighting the choking wrist, shoulder-walking toward the mat to slide out."
     turtle-top          -> "...top athlete attacking a turtled opponent, chest on the back with a near-side seatbelt and waist grip, threatening to insert hooks."
     turtle-bottom       -> "...bottom athlete in a tight defensive turtle, elbows and knees connected, protecting the neck, ready to granby roll or stand up."
     sub-rnc             -> "...attacker finishing a rear naked choke from back control, both hooks in, choking arm under the chin, second hand behind the head, opponent tapping."
     sub-armbar          -> "...attacker finishing a juji-gatame armbar, hips raised, opponent's arm extended thumb-up between the thighs."
     sub-triangle        -> "...bottom athlete finishing a triangle choke from guard, legs figure-foured around the opponent's neck and one arm, pulling the head down."
     sub-kimura          -> "...attacker finishing a kimura shoulder lock, figure-four grip on the wrist, rotating the opponent's arm behind the back."
     sub-collar-choke    -> "...top athlete finishing a cross-collar choke from mount, both hands deep in the lapels, elbows flaring, opponent tapping."
     sub-guillotine      -> "...attacker finishing a guillotine choke, opponent's head trapped under the armpit, choking arm under the chin, pulling up with a high elbow."
  ============================================================================
  -->

//    top         objective for the top / dominant player
//    bottom      objective for the bottom / disadvantaged player

//
//  transition.kind drives the color/icon:

// Helper: every submission is a terminal "finish" node that resets to standing.
function subNode(id, name, desc, imagePrompt) {
  return {
    id, name, group: "Submissions", rating: 10, layout: "submission", perspective: "top",
    summary: desc,
    alignment: desc,
    top: "Finish the submission with control — secure the tap.",
    bottom: "Too late to defend from here. In live training, tap early and reset.",
    grips: "See the position this submission was entered from.",
    imagePrompt,
    transitions: [
      { label: "Reset to Standing", kind: "reset", detail: "Start a new flow from the neutral standing position.", to: "standing" },
    ],
  };
}

function trainingFor(id) {
  if (TRAINING[id]) return TRAINING[id];
  const p = POSITIONS[id];
  const persp = p.perspective;
  const solo = persp === "bottom"
    ? { name: "Shrimp, bridge & recover circuit", type: "solo", reps: "3×30s", desc: "Hip escapes, bridges, and guard recoveries — the movements this bottom position depends on." }
    : persp === "top"
    ? { name: "Base & weight-distribution flow", type: "solo", reps: "3×30s", desc: "Sprawls, knee-slides, and base shifts to keep your hips heavy and connected on top." }
    : { name: "Standing movement warm-up", type: "solo", reps: "3×30s", desc: "Penetration steps, sprawls, and stance switches to sharpen your base." };
  const primary = p.transitions.find(t => t.kind !== "escape") || p.transitions[0];
  const pl = primary ? primary.label : "your main attack";
  return {
    focus: `Pick your highest-percentage option here — ${pl} — and over-invest in it until it's reflexive, then pressure-test it in positional sparring.`,
    drills: [
      solo,
      { name: `Isolate "${pl}"`, type: "partner", reps: "3×10/side", desc: `Rep the entry and finish of ${pl.toLowerCase()} with a compliant, then progressively-resisting, partner.` },
      { name: `${p.name} positional rounds`, type: "positional", reps: "4×2–3 min", desc: `Start every round here; ${persp === "top" ? "top consolidates & advances" : persp === "bottom" ? "bottom escapes or attacks" : "both fight for the dominant entry"}. Reset on score.` },
    ],
    mistakes: ["Drilling with zero resistance, so it never transfers to rolling", "No clear first objective from the position", "Skipping positional sparring — the rep that actually builds timing"],
    concepts: ["Choose one A-game option and drill it relentlessly", "Drill → resist → positional spar → live roll", "Track what fails and feed it back into drilling"],
  };
}

function ytTime(t) {
  if (t == null) return null;
  if (/^\d+$/.test(t)) return parseInt(t, 10);
  let s = 0; const h = t.match(/(\d+)h/), m = t.match(/(\d+)m/), sec = t.match(/(\d+)s/);
  if (h) s += +h[1] * 3600; if (m) s += +m[1] * 60; if (sec) s += +sec[1];
  return s || null;
}
function parseYouTube(url) {
  if (!url || typeof url !== "string") return null;
  try {
    const u = new URL(url.trim());
    let id = null;
    if (u.hostname.includes("youtu.be")) id = u.pathname.slice(1);
    else if (u.searchParams.get("v")) id = u.searchParams.get("v");
    else if (u.pathname.includes("/embed/")) id = u.pathname.split("/embed/")[1];
    else if (u.pathname.includes("/shorts/")) id = u.pathname.split("/shorts/")[1];
    if (!id) return null;
    id = id.split(/[/?&]/)[0];
    if (!/^[\w-]{6,}$/.test(id)) return null;
    return { id, start: ytTime(u.searchParams.get("start") || u.searchParams.get("t")), end: ytTime(u.searchParams.get("end")) };
  } catch (e) { return null; }
}
function embedUrl(v) {
  return `https://www.youtube-nocookie.com/embed/${v.id}?rel=0&modestbranding=1${v.start ? `&start=${v.start}` : ""}${v.end ? `&end=${v.end}` : ""}`;
}

// Assemble a full training session from a set of focus positions.
// includeMobility swaps the warm-up / cool-down for the real dynamic warm-up
// and static recovery-stretch routines from the Athlete module.
function buildSession(focusIds, minutes, seed, includeMobility) {
  const positions = focusIds.map(id => POSITIONS[id]).filter(Boolean);
  const rng = (() => { let s = seed * 9301 + 49297; return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; }; })();
  const shuf = (a) => { const x = [...a]; for (let i = x.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [x[i], x[j]] = [x[j], x[i]]; } return x; };
  const collect = (type) => positions.flatMap(p => trainingFor(p.id).drills.filter(d => d.type === type).map(d => ({ ...d, pos: p.name })));
  const pick = (arr, n) => shuf(arr).slice(0, n);
  const m = (f) => Math.max(3, Math.round(minutes * f));
  const liveItems = pick(positions, 2).map(p => ({ name: `Specific rounds from ${p.name}`, reps: "3×3 min", desc: "Start in position, emphasize your A-game; reset on score." }));
  liveItems.push({ name: "Free rolling", reps: "3×5 min", desc: "Open rounds — apply what you drilled today." });
  const mobItems = (id) => (MOBILITY_BY_ID[id] ? MOBILITY_BY_ID[id].items.map(it => ({ name: it.name, reps: it.dur, desc: it.desc })) : []);
  const warmItems = includeMobility ? mobItems("warmup") : pick(collect("solo"), 3);
  const coolItems = includeMobility ? mobItems("recovery") : [
    { name: "Hip / neck / knee / ankle mobility", reps: "5 min", desc: "Slow CARs and stretches for your key joints." },
    { name: "Nasal-breathing cool-down", reps: "3 min", desc: "Bring the heart rate down and review one thing you learned." },
  ];
  return [
    { name: includeMobility ? "Warm-Up (dynamic mobility)" : "Warm-up & Movement", mins: m(0.12), color: "#38bdf8", note: includeMobility ? "The Athlete warm-up routine — raise temperature and open the hips before contact." : "Raise the heart rate and groove the solo movements your game relies on.", items: warmItems },
    { name: "Technical Drilling", mins: m(0.26), color: "#a78bfa", note: "Reps with progressive resistance — quality over speed.", items: pick(collect("partner"), 4) },
    { name: "Positional Sparring", mins: m(0.30), color: "#34d399", note: "Start in position, reset on score/escape. Your highest-ROI block.", items: pick(collect("positional"), 3) },
    { name: "Live / Specific Rounds", mins: m(0.22), color: "#fbbf24", note: "Free and specific-start rounds emphasizing your game plan.", items: liveItems },
    { name: includeMobility ? "Cool-Down (recovery stretch)" : "Cool-down & Mobility", mins: m(0.10), color: "#22d3ee", note: includeMobility ? "The Athlete recovery stretch — hold each 30–45s." : "Down-regulate and protect the positions you live in.", items: coolItems },
  ];
}

//////////////////////////////////////////////////////////////////////////////
//  RULESETS — legality of techniques by competition format
//  ---------------------------------------------------------------------------
//  illegalSubs : submission position ids banned in this ruleset
//  illegalPos  : positions banned (e.g. knee-reaping entanglements)
//////////////////////////////////////////////////////////////////////////////

const RULESETS = {
  "Open Mat (all legal)": { illegalSubs: new Set(), illegalPos: new Set(), note: "Everything is fair game." },
  "IBJJF Gi · White–Blue": {
    illegalSubs: new Set(["sub-heelhook", "sub-kneebar", "sub-toehold", "sub-twister"]),
    illegalPos: new Set(["saddle"]),
    note: "No heel hooks, kneebars, toe holds, twisters, or knee-reaping (saddle).",
  },
  "IBJJF Gi · Purple": {
    illegalSubs: new Set(["sub-heelhook", "sub-twister"]),
    illegalPos: new Set(["saddle"]),
    note: "Kneebars & toe holds now legal; heel hooks, twisters, reaping still banned.",
  },
  "IBJJF Gi · Brown–Black": {
    illegalSubs: new Set(["sub-heelhook", "sub-twister"]),
    illegalPos: new Set(),
    note: "Heel hooks & twisters banned in the gi; other leg locks legal.",
  },
  "ADCC / Modern No-Gi": { illegalSubs: new Set(), illegalPos: new Set(), note: "All leg locks & reaping legal." },
  "EBI / Sub-Only": { illegalSubs: new Set(), illegalPos: new Set(), note: "Submission-only — all techniques legal." },
};

function isIllegal(toId, ruleset) {
  const rs = RULESETS[ruleset]; if (!rs) return false;
  return rs.illegalSubs.has(toId) || rs.illegalPos.has(toId);
}

// IBJJF-style points awarded for completing a transition (approximation).
function actionPoints(t) {
  switch (t.kind) {
    case "takedown": return 2;
    case "sweep": return 2;
    case "pass": return 3;
    case "backtake": return 4;
    case "submission": return "SUB";
    case "transition":
      if (t.to === "mount-top") return 4;
      if (t.to === "back-attacker") return 4;
      if (t.to === "kob-top") return 2;
      return 0;
    default: return 0;
  }
}

// Reverse edges: for each position, which positions/actions arrive here.
const INCOMING = {};
Object.values(POSITIONS).forEach(p => p.transitions.forEach(t => {
  (INCOMING[t.to] = INCOMING[t.to] || []).push({ from: p.id, label: t.label, kind: t.kind });
}));

// Score a flow path purely from its node sequence (deterministic, stateless).
function scorePath(history) {
  let points = 0, finish = null;
  for (let i = 1; i < history.length; i++) {
    const from = POSITIONS[history[i - 1]];
    const t = from && from.transitions.find(x => x.to === history[i]);
    if (!t) continue;
    const pts = actionPoints(t);
    if (pts === "SUB") finish = POSITIONS[history[i]];
    else if (typeof pts === "number") points += pts;
  }
  return { points, finish };
}

function RatingGauge({ rating }) {
  const isSub = rating >= 10;
  const clamped = Math.max(-5, Math.min(5, rating));
  const pct = ((clamped + 5) / 10) * 100; // 0..100
  const color =
    isSub ? "#fb7185" :
    rating > 2 ? "#34d399" :
    rating > 0 ? "#86efac" :
    rating === 0 ? "#fbbf24" :
    rating > -3 ? "#fb923c" : "#f87171";
  const label =
    isSub ? "Finish" :
    rating >= 4 ? "Dominant" :
    rating > 0 ? "Advantage" :
    rating === 0 ? "Neutral" :
    rating > -4 ? "Disadvantage" : "Critical";

  return (
    <div className="w-full">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs uppercase tracking-widest text-slate-400">Positional Advantage</span>
        <span className="text-sm font-semibold" style={{ color }}>
          {isSub ? "★ Submission" : `${rating > 0 ? "+" : ""}${rating} · ${label}`}
        </span>
      </div>
      <div className="relative h-3 rounded-full bg-ink-700 overflow-hidden">
        <div className="absolute inset-0" style={{
          background: "linear-gradient(90deg, #ef4444 0%, #f59e0b 30%, #fbbf24 50%, #84cc16 70%, #10b981 100%)",
          opacity: 0.35
        }} />
        {/* center tick */}
        <div className="absolute top-0 bottom-0 left-1/2 w-px bg-white/25" />
        {/* marker */}
        <div
          className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 h-5 w-5 rounded-full border-2 border-ink-950 shadow-lg transition-all duration-500"
          style={{ left: `${pct}%`, background: color, boxShadow: `0 0 14px ${color}` }}
        />
      </div>
      <div className="flex justify-between mt-1 text-[10px] text-slate-500 font-medium">
        <span>−5 Worst</span><span>0 Neutral</span><span>+5 Best</span>
      </div>
    </div>
  );
}

// Shared rating -> color helper (used by gauge, pips, and the map).
function ratingColor(rating) {
  if (CB_MODE) { // blue (good) / orange (bad) — deuteranopia-safe

    if (rating > 0)   return "#7dd3fc";

// Persist any JSON-serializable state to localStorage.
function useLocalStorage(key, initial) {
  const [val, setVal] = React.useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch (e) { return initial; }
  });
  React.useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }, [key, val]);
  return [val, setVal];
}

function exportData() {

  const payload = { app: "SubMap", version: 1, exported: new Date().toISOString(), data };

function importData(file, done) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const parsed = JSON.parse(r.result);
      const data = parsed.data || parsed;
      Object.entries(data).forEach(([k, v]) => {
        if (k.indexOf("bjjflow:") === 0) localStorage.setItem(k, typeof v === "string" ? v : JSON.stringify(v));
      });
      done(true);
    } catch (e) { done(false); }
  };
  r.readAsText(file);
}
function resetData() { DATA_KEYS.forEach(k => localStorage.removeItem(k)); }
function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(c => { const s = String(c == null ? "" : c); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(",")).join("\n");
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" })); a.download = filename; a.click();
}

};
// Human duration between two ms timestamps (for time-in-rank).
function fmtDur(ms) {
  const d = Math.max(0, Math.floor(ms / 86400000));
  if (d < 31) return d + "d";
  const mo = Math.floor(d / 30.44);
  if (mo < 12) return mo + "mo";
  const y = Math.floor(mo / 12), rem = mo % 12;
  return y + "y" + (rem ? ` ${rem}mo` : "");
}
// ISO-week key (YYYY-Www) for streak/heatmap grouping.
function weekKey(d) {
  const dt = new Date(d); dt.setHours(0, 0, 0, 0);
  dt.setDate(dt.getDate() + 4 - (dt.getDay() || 7));
  const yearStart = new Date(dt.getFullYear(), 0, 1);
  const wk = Math.ceil((((dt - yearStart) / 86400000) + 1) / 7);
  return `${dt.getFullYear()}-W${String(wk).padStart(2, "0")}`;
}

// Map a submission you keep getting caught by -> a position to study its defense.
const SUB_DEFENSE = {
  "Rear Naked Choke": "back-defender", "Heel Hook": "ashi", "Kneebar": "saddle",
  "Straight Ankle Lock": "ashi", "Toe Hold": "fifty-fifty", "Armbar": "mount-bottom",
  "Triangle Choke": "closed-guard-top", "Kimura": "side-bottom", "Guillotine Choke": "front-headlock",
  "Omoplata": "closed-guard-top", "Collar Choke": "mount-bottom", "D'Arce": "turtle-bottom",
  "Twister": "turtle-bottom", "Arm Triangle": "side-bottom",
};
function defenseFor(name) {
  if (SUB_DEFENSE[name]) return SUB_DEFENSE[name];
  for (const k in SUB_DEFENSE) { if (name.indexOf(k.split(" ")[0]) >= 0) return SUB_DEFENSE[k]; }
  return null;
}

// Turn the user's logged data into a few actionable, personalized insights.
function buildInsights(ctx) {
  const { sessions = [], rolls = [], learned = [], srs = {}, activePlan = null, profile = {} } = ctx;
  const today = new Date().toISOString().slice(0, 10);
  const out = [];
  const tally = (arr, key) => { const m = {}; arr.forEach(r => (r[key] || []).forEach(s => { m[s] = (m[s] || 0) + 1; })); return Object.entries(m).sort((a, b) => b[1] - a[1]); };
  const taken = tally(rolls, "taken"), hit = tally(rolls, "hit");
  if (taken[0] && taken[0][1] >= 2) {
    const def = defenseFor(taken[0][0]);
    out.push({ icon: "🛡️", tone: "rose", title: `Plug the leak: the ${taken[0][0]}`, body: `You've been caught ${taken[0][1]}× by this in your roll log — drill the escape before it becomes a habit.`,
      cta: def ? { label: `Study ${POSITIONS[def].name}`, action: { type: "jump", id: def } } : { label: "Open Drill", action: { type: "drill" } } });
  }
  if (hit[0] && hit[0][1] >= 3) out.push({ icon: "⭐", tone: "emerald", title: `Your bread-and-butter: the ${hit[0][0]}`, body: `${hit[0][1]} finishes logged. Build a game plan that funnels opponents into it.`, cta: { label: "Open Game Plans", action: { type: "plans" } } });
  if (activePlan) {
    const picks = Object.keys(activePlan.picks);
    const miss = ["side-bottom", "mount-bottom", "back-defender"].filter(id => !picks.includes(id));
    if (miss.length) out.push({ icon: "🧩", tone: "amber", title: `"${activePlan.name}" has escape gaps`, body: `No go-to set from ${miss.map(id => POSITIONS[id].name).slice(0, 2).join(" or ")} — opponents will find the holes.`, cta: { label: `Set one from ${POSITIONS[miss[0]].name}`, action: { type: "jump", id: miss[0] } } });
  }
  const weak = Object.entries(srs).filter(([, v]) => v.box < 2 && v.seen >= 2);
  if (weak.length >= 3) out.push({ icon: "🎯", tone: "indigo", title: `${weak.length} techniques are shaky`, body: `Spaced repetition flagged these for review — a few quiz rounds will lock them in.`, cta: { label: "Open Drill", action: { type: "drill" } } });
  const ls = new Set(learned); let lowest = null;
  ["Guard", "Half Guard", "Side Control", "Mount", "Back Control", "Turtle", "Leg Entanglements"].forEach(g => {
    const items = Object.values(POSITIONS).filter(p => p.group === g); const pc = items.filter(p => ls.has(p.id)).length / items.length;
    if (lowest === null || pc < lowest.pc) lowest = { g, pc };
  });
  if (lowest && lowest.pc < 0.34 && learned.length >= 3) out.push({ icon: "📚", tone: "sky", title: `Your ${lowest.g} is underbuilt`, body: `Only ${Math.round(lowest.pc * 100)}% of ${lowest.g} positions marked learned — spend a week there.`, cta: { label: `Explore ${lowest.g}`, action: { type: "jumpGroup", group: lowest.g } } });
  const thisWeek = sessions.filter(e => weekKey(e.date) === weekKey(today)).length, goal = profile.weeklyGoal || 3;
  if (thisWeek < goal && sessions.length > 0) { const n = goal - thisWeek; out.push({ icon: "📆", tone: "cyan", title: `${n} more session${n !== 1 ? "s" : ""} to hit your weekly goal`, body: `You're at ${thisWeek}/${goal} this week — log your next class to keep the streak alive.`, cta: { label: "Log a class", action: { type: "journal" } } }); }
  if (out.length === 0) out.push({ icon: "🌱", tone: "slate", title: "Start logging to unlock insights", body: "Once you log a few classes and rolls, SubMap surfaces personalized tips here — what to drill, gaps in your game, and your go-to finishes.", cta: { label: "Open Journal", action: { type: "journal" } } });
  return out;
}

// Aggregate the user's data into a single context for goals/achievements.
function statsCtx({ sessions = [], rolls = [], learned = [], drillAgg = { seen: 0, correct: 0 }, plans = [], activePlan = null, promotions = [], profile = {} }) {
  const today = new Date().toISOString().slice(0, 10);
  const matHours = Math.round(sessions.reduce((n, e) => n + (e.length || e.minutes || 0), 0) / 60 * 10) / 10;
  const learnedPct = Math.round(learned.length / Object.keys(POSITIONS).length * 100);
  const subsHit = rolls.reduce((n, r) => n + (r.hit ? r.hit.length : 0), 0);
  const subPositions = new Set(rolls.flatMap(r => r.hit || [])).size;
  const weeks = new Set(sessions.map(e => weekKey(e.date)));
  let streakWeeks = 0; const d = new Date(today); if (!weeks.has(weekKey(d))) d.setDate(d.getDate() - 7);
  while (weeks.has(weekKey(d))) { streakWeeks++; d.setDate(d.getDate() - 7); }
  return { sessions, rolls, learned, drillAgg, plans, activePlan, promotions: promotions.length, profile, matHours, learnedPct, subsHit, subPositions, streakWeeks };
}
function computeXP(c) {
  return Math.round(c.sessions.length * 10 + c.matHours * 5 + c.rolls.length * 4 + c.learned.length * 8 + c.drillAgg.correct * 2 + c.subsHit * 3 + c.promotions * 100);
}
const xpForLevel = (lvl) => lvl * 300; // per-level XP step
function levelInfo(xp) { const level = 1 + Math.floor(xp / 300); const into = xp % 300; return { level, into, need: 300, pct: into / 300 }; }

  sessions: { label: "sessions logged", unit: "" },

  learnedPct: { label: "positions learned", unit: "%" },
  subsHit: { label: "submissions hit", unit: "" },
  weeklyStreak: { label: "week streak", unit: "w" },
  subPositions: { label: "different subs hit", unit: "" },
  drillAnswered: { label: "quiz questions", unit: "" },
};
const GOAL_PRESETS = [
  { metric: "sessions", target: 50 }, { metric: "matHours", target: 100 }, { metric: "learnedPct", target: 50 },
  { metric: "subsHit", target: 100 }, { metric: "weeklyStreak", target: 8 }, { metric: "subPositions", target: 8 },
];
function metricValue(metric, c) {
  return ({ sessions: c.sessions.length, matHours: c.matHours, learnedPct: c.learnedPct, subsHit: c.subsHit, weeklyStreak: c.streakWeeks, subPositions: c.subPositions, drillAnswered: c.drillAgg.seen })[metric] || 0;
}

//////////////////////////////////////////////////////////////////////////////
//  GLOBAL MAP — the whole tree at a glance (tech-tree overview)
//  Columns = groups, x-ordered; nodes colored by rating; edges = transitions.
//  Hover a node to spotlight its 1-hop neighborhood; click to navigate.
//////////////////////////////////////////////////////////////////////////////

function MapGraph({ current, onPick, onClose }) {
  const [hover, setHover] = React.useState(null);
  const COLW = 158, X0 = 90, Y0 = 78, ROWH = 66;

  const cols = GROUP_ORDER.map(g => Object.values(POSITIONS).filter(p => p.group === g));
  const coord = {};
  cols.forEach((items, ci) => items.forEach((p, ri) => { coord[p.id] = { x: X0 + ci * COLW, y: Y0 + ri * ROWH }; }));
  const width = X0 + cols.length * COLW;
  const maxRows = Math.max(...cols.map(c => c.length));
  const height = Y0 + maxRows * ROWH + 20;

  const edges = [];
  Object.values(POSITIONS).forEach(p => p.transitions.forEach(t => {
    if (coord[t.id] && t.id !== p.id) edges.push({ from: p.id, to: t.id });
  }));

  const focus = hover;
  const neighbors = new Set();
  if (focus) {
    POSITIONS[focus].transitions.forEach(t => neighbors.add(t.id));
    Object.values(POSITIONS).forEach(p => p.transitions.forEach(t => { if (t.id === focus) neighbors.add(p.id); }));
    neighbors.add(focus);
  }
  const lit = (id) => !focus || neighbors.has(id);
  const litEdge = (e) => !focus || e.from === focus || e.to === focus;

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-ink-950/80 backdrop-blur-sm">
      <div className="shrink-0 glass border-b border-white/10 px-5 py-3 flex items-center gap-3">
        <span className="text-lg">🗺️</span>
        <h2 className="font-display font-semibold text-white">Flow Map — the whole tree</h2>
        <span className="hidden sm:block text-xs text-slate-500">hover to spotlight a position's connections · click to jump</span>
        <button onClick={onClose} className="ml-auto text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200">Close ✕</button>
      </div>
      <div className="flex-1 overflow-auto p-4">
        <svg width={width} height={height} className="mx-auto" style={{ minWidth: width }}>
          {/* group headers */}
          {GROUP_ORDER.map((g, ci) => (
            <text key={g} x={X0 + ci * COLW} y={34} textAnchor="middle"
              className="fill-slate-500" style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase" }}>
              {g}
            </text>
          ))}
          {/* edges */}
          {edges.map((e, i) => {
            const a = coord[e.from], b = coord[e.to];
            const active = focus && (e.from === focus || e.to === focus);
            return (
              <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={active ? "rgba(129,140,248,.8)" : "rgba(148,163,184,.13)"}
                strokeWidth={active ? 1.8 : 1}
                opacity={litEdge(e) ? 1 : 0.15} />
            );
          })}
          {/* nodes */}
          {Object.values(POSITIONS).map(p => {
            const c = coord[p.id];
            const col = ratingColor(p.rating);
            const isCur = p.id === current;
            const r = isCur ? 21 : 16;
            const short = p.name.length > 21 ? p.name.slice(0, 20) + "…" : p.name;
            return (
              <g key={p.id} style={{ cursor: "pointer" }} opacity={lit(p.id) ? 1 : 0.2}
                onMouseEnter={() => setHover(p.id)} onMouseLeave={() => setHover(null)}
                onClick={() => onPick(p.id)}>
                {isCur && <circle cx={c.x} cy={c.y} r={r + 5} fill="none" stroke={col} strokeWidth="1.5" opacity=".5" />}
                <circle cx={c.x} cy={c.y} r={r} fill={col + "26"} stroke={col} strokeWidth={isCur ? 3 : 1.6} />
                <text x={c.x} y={c.y + 3.5} textAnchor="middle" style={{ fontSize: 10, fontWeight: 700 }} fill={col}>
                  {p.rating >= 10 ? "★" : (p.rating > 0 ? "+" + p.rating : p.rating)}
                </text>
                <text x={c.x} y={c.y + r + 12} textAnchor="middle" style={{ fontSize: 8.5 }} className="fill-slate-300">
                  {short}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

//////////////////////////////////////////////////////////////////////////////
//  DRILL & QUIZ MODE — active-recall training for competition prep
//  ---------------------------------------------------------------------------
//  Three modes:
//   • Game-Plan Recall : flashcards of YOUR planned response per position
//   • Transition Quiz  : "From X, where does action Y lead?" (multiple choice)
//   • Hierarchy Quiz   : "Which position is more dominant?" (positional value)
//////////////////////////////////////////////////////////////////////////////

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function DrillModal({ activePlan, srs = {}, drillAgg = { seen: 0, correct: 0 }, focusId = null, onRecord, onJump, onClose }) {
  const focusPos = focusId && POSITIONS[focusId] && POSITIONS[focusId].transitions.length ? POSITIONS[focusId] : null;
  const planPicks = activePlan ? Object.entries(activePlan.picks) : [];
  const allPos = React.useMemo(() => Object.values(POSITIONS), []);
  const nonSub = React.useMemo(() => allPos.filter(p => p.group !== "Submissions"), [allPos]);
  // Spaced repetition: items with a low Leitner box are "due" and resurface more often.
  const boxOf = (key) => (srs[key] ? srs[key].box : 0);
  const mastered = Object.values(srs).filter(v => v.box >= 4).length;
  const accAll = drillAgg.seen ? Math.round((drillAgg.correct / drillAgg.seen) * 100) : 0;

  const modes = [
    { id: "recall", label: "Game-Plan Recall", enabled: planPicks.length > 0 },
    { id: "transition", label: "Transition Quiz", enabled: true },
    { id: "hierarchy", label: "Hierarchy Quiz", enabled: true },
  ];
  const [mode, setMode] = React.useState(focusPos ? "transition" : planPicks.length ? "recall" : "transition");
  const [score, setScore] = React.useState({ c: 0, n: 0 });
  const [streak, setStreak] = React.useState(0);
  const [q, setQ] = React.useState(null);
  const [answered, setAnswered] = React.useState(null); // chosen id | 'revealed' | null

  const rand = (a) => a[Math.floor(Math.random() * a.length)];
  const sampleIds = (pool, n, exclude) => {
    const p = pool.filter(id => !exclude.includes(id));
    return shuffle(p).slice(0, n);
  };

  function genTransition() {
    let p, t;
    // If launched from a specific position, mostly quiz that position.
    if (focusPos && Math.random() < 0.7) { p = focusPos; t = rand(p.transitions); }
    // 50% of the time, resurface a "due" (previously-missed / low-box) item.
    if (!p) {
      const weak = Object.keys(srs).filter(k => k.includes("|") && srs[k].box < 3);
      if (weak.length && Math.random() < 0.5) {
        const [posId, label] = rand(weak).split("|");
        p = POSITIONS[posId];
        t = p && p.transitions.find(x => x.label === label);
      }
    }
    if (!p || !t) { p = rand(nonSub.filter(x => x.transitions.length)); t = rand(p.transitions); }
    const distract = sampleIds(allPos.map(x => x.id), 3, [t.to, p.id]);
    const options = shuffle([t.to, ...distract]).map(id => ({ id, name: POSITIONS[id].name }));
    return { type: "transition", key: `${p.id}|${t.label}`, prompt: `From ${p.name}, where does “${t.label}” lead?`, detail: t.detail, options, answer: t.to };
  }
  function genHierarchy() {
    let a, b, tries = 0;
    do { [a, b] = shuffle(nonSub).slice(0, 2); tries++; } while (a.rating === b.rating && tries < 10);
    const answer = a.rating >= b.rating ? a.id : b.id;
    const meta = { [a.id]: a.rating, [b.id]: b.rating };
    return { type: "hierarchy", key: null, prompt: "Which position is more dominant? (higher positional advantage)", options: shuffle([{ id: a.id, name: a.name }, { id: b.id, name: b.name }]), answer, meta };
  }
  function genRecall() {
    // Prefer planned positions you haven't mastered yet.
    const weak = planPicks.filter(([posId]) => boxOf(posId) < 3);
    const pool = weak.length && Math.random() < 0.6 ? weak : planPicks;
    const [posId, label] = rand(pool);
    const tr = (POSITIONS[posId].transitions || []).find(t => t.label === label);
    return { type: "recall", key: posId, posId, prompt: POSITIONS[posId].name, answerLabel: label, answerTo: tr ? tr.to : null, detail: tr ? tr.detail : "" };
  }
  const generate = (m) => (m === "recall" ? genRecall() : m === "hierarchy" ? genHierarchy() : genTransition());

  React.useEffect(() => { setQ(generate(mode)); setAnswered(null); /* eslint-disable-next-line */ }, [mode]);

  const next = () => { setQ(generate(mode)); setAnswered(null); };
  const choose = (id) => {
    if (answered) return;
    setAnswered(id);
    const ok = id === q.answer;
    setScore(s => ({ c: s.c + (ok ? 1 : 0), n: s.n + 1 }));
    setStreak(st => (ok ? st + 1 : 0));
    onRecord && onRecord(q.key, ok);
  };
  const grade = (ok) => { setScore(s => ({ c: s.c + (ok ? 1 : 0), n: s.n + 1 })); setStreak(st => (ok ? st + 1 : 0)); onRecord && onRecord(q.key, ok); next(); };
  const reveal = () => { if (!answered) setAnswered("revealed"); };

  const pct = score.n ? Math.round((score.c / score.n) * 100) : 0;

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-ink-950/85 backdrop-blur-sm">
      <div className="shrink-0 glass border-b border-white/10 px-5 py-3 flex items-center gap-3 flex-wrap">
        <span className="text-lg">🎯</span>
        <h2 className="font-display font-semibold text-white">Drill &amp; Quiz</h2>
        <div className="flex items-center gap-1 ml-2">
          {modes.map(m => (
            <button key={m.id} disabled={!m.enabled} onClick={() => setMode(m.id)}
              title={!m.enabled ? "Activate a game plan with moves first" : ""}
              className={`text-xs px-3 py-1.5 rounded-lg transition ${mode === m.id ? "bg-indigo-500/25 text-indigo-100 ring-1 ring-indigo-400/40" : "bg-ink-700 text-slate-400 hover:bg-ink-600 disabled:opacity-30 disabled:cursor-not-allowed"}`}>
              {m.label}
            </button>
          ))}
        </div>
        <div className="ml-auto flex items-center gap-3">
          <div className="hidden md:block text-xs text-slate-500" title="Spaced-repetition mastery (Leitner box ≥ 4)">🧩 {mastered} mastered · {accAll}% all-time</div>
          <div className="text-xs text-slate-400">Score <span className="text-white font-semibold">{score.c}/{score.n}</span> · {pct}%</div>
          {streak >= 2 && <div className="text-xs px-2 py-0.5 rounded-full bg-amber-400/20 text-amber-300 font-semibold">🔥 {streak} streak</div>}
          <button onClick={() => { setScore({ c: 0, n: 0 }); setStreak(0); next(); }} className="text-xs px-2.5 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-300">Reset</button>
          <button onClick={onClose} className="text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200">Close ✕</button>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto">
        <div className="max-w-2xl mx-auto px-4 sm:px-6 py-8">
          {!q ? null : q.type === "recall" ? (
            <div className="space-y-5">
              <div className="text-center">
                <span className="text-[11px] uppercase tracking-widest text-slate-500">You're here — what's your plan?</span>
                <h3 className="font-display text-3xl font-bold text-white mt-1">{q.prompt}</h3>
              </div>
              <div className="rounded-3xl glass ring-1 ring-white/5 overflow-hidden">
                <div className="aspect-[5/3]"><MatScene layout={POSITIONS[q.posId].layout} /></div>
              </div>
              {answered ? (
                <div className="space-y-4">
                  <div className="rounded-2xl bg-amber-400/10 border border-amber-400/30 p-4 text-center">
                    <div className="text-[11px] uppercase tracking-widest text-amber-300/80">Your A-game</div>
                    <div className="text-xl font-bold text-amber-100 mt-1">{q.answerLabel}</div>
                    {q.answerTo && <div className="text-sm text-amber-200/70 mt-0.5">→ {POSITIONS[q.answerTo].name}</div>}
                    {q.detail && <div className="text-xs text-slate-400 mt-2">{q.detail}</div>}
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <button onClick={() => grade(false)} className="px-4 py-3 rounded-xl bg-rose-500/15 hover:bg-rose-500/25 text-rose-200 border border-rose-400/30 font-semibold transition">✗ Missed it</button>
                    <button onClick={() => grade(true)} className="px-4 py-3 rounded-xl bg-emerald-500/15 hover:bg-emerald-500/25 text-emerald-200 border border-emerald-400/30 font-semibold transition">✓ Got it</button>
                  </div>
                  <button onClick={() => onJump(q.posId)} className="w-full text-xs text-slate-500 hover:text-slate-300">Open this position →</button>
                </div>
              ) : (
                <button onClick={reveal} className="w-full px-4 py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-semibold transition">Reveal my move</button>
              )}
            </div>
          ) : (
            <div className="space-y-5">
              <div className="text-center">
                <span className="text-[11px] uppercase tracking-widest text-slate-500">{q.type === "hierarchy" ? "Positional hierarchy" : "Transition recall"}</span>
                <h3 className="font-display text-2xl font-bold text-white mt-1 leading-snug">{q.prompt}</h3>
              </div>
              <div className="grid gap-3">
                {q.options.map(opt => {
                  const isAnswer = opt.id === q.answer;
                  const isChosen = answered === opt.id;
                  let cls = "bg-ink-800/70 ring-1 ring-white/8 hover:ring-indigo-400/50 hover:bg-ink-700/70";
                  if (answered) {
                    if (isAnswer) cls = "bg-emerald-500/15 ring-2 ring-emerald-400/60";
                    else if (isChosen) cls = "bg-rose-500/15 ring-2 ring-rose-400/60";
                    else cls = "bg-ink-800/40 ring-1 ring-white/5 opacity-60";
                  }
                  return (
                    <button key={opt.id} onClick={() => choose(opt.id)} disabled={!!answered}
                      className={`text-left rounded-2xl px-4 py-4 transition flex items-center gap-3 ${cls}`}>
                      {q.type === "hierarchy" && <RatingPip rating={POSITIONS[opt.id].rating} />}
                      <span className="flex-1 font-semibold text-slate-100">{opt.name}</span>
                      {answered && q.type === "hierarchy" && (
                        <span className="text-xs text-slate-400">{q.meta[opt.id] > 0 ? "+" : ""}{q.meta[opt.id]}</span>
                      )}
                      {answered && isAnswer && <span className="text-emerald-300 font-bold">✓</span>}
                      {answered && isChosen && !isAnswer && <span className="text-rose-300 font-bold">✗</span>}
                    </button>
                  );
                })}
              </div>
              {answered && q.type === "transition" && q.detail && (
                <p className="text-sm text-slate-400 text-center px-4">{q.detail}</p>
              )}
              {answered && (
                <button onClick={next} className="w-full px-4 py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-semibold transition">Next question →</button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CommandPalette({ commands = [], onPick, onClose }) {
  const [q, setQ] = React.useState("");
  const [idx, setIdx] = React.useState(0);
  const inputRef = React.useRef(null);
  const items = React.useMemo(() => {
    const s = q.trim().toLowerCase();
    const cmds = commands.filter(c => !s || c.label.toLowerCase().includes(s)).map(c => ({ kind: "cmd", ...c }));
    const pos = (s ? Object.values(POSITIONS).filter(p => (p.name + " " + p.group + " " + p.summary).toLowerCase().includes(s)) : []).slice(0, 40)
      .map(p => ({ kind: "pos", id: p.id, label: p.name, sub: p.group + " · " + p.summary, rating: p.rating }));
    return [...cmds, ...pos];
  }, [q, commands]);
  React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  React.useEffect(() => { setIdx(0); }, [q]);
  const run = (it) => { if (!it) return; if (it.kind === "cmd") { it.run(); onClose(); } else onPick(it.id); };
  const onKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setIdx(i => Math.min(i + 1, items.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === "Enter") { run(items[idx]); }
    else if (e.key === "Escape") { onClose(); }
  };
  let lastKind = null;
  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center pt-24 px-4 bg-ink-950/70 backdrop-blur-sm" onClick={onClose}>
      <div className="w-full max-w-lg glass rounded-2xl ring-1 ring-white/10 overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 border-b border-white/10">
          <span className="text-slate-500">🔎</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey} placeholder="Search actions & positions…"
            className="flex-1 bg-transparent py-3 text-slate-100 placeholder-slate-500 focus:outline-none" />
        </div>
        <div className="max-h-80 overflow-y-auto py-2">
          {items.length === 0 && <div className="px-4 py-6 text-center text-slate-500 text-sm">No matches</div>}
          {items.map((it, i) => {
            const header = it.kind !== lastKind ? (it.kind === "cmd" ? "Actions" : "Positions") : null; lastKind = it.kind;
            return (
              <React.Fragment key={it.kind + (it.id || it.label)}>
                {header && <div className="px-4 pt-2 pb-1 text-[10px] font-bold uppercase tracking-widest text-slate-600">{header}</div>}
                <button onMouseEnter={() => setIdx(i)} onClick={() => run(it)}
                  className={`w-full text-left px-4 py-2 flex items-center gap-3 transition ${i === idx ? "bg-indigo-500/20" : ""}`}>
                  {it.kind === "cmd" ? <span className="w-7 text-center text-base">{it.icon}</span> : <RatingPip rating={it.rating} />}
                  <span className="flex-1 min-w-0"><span className="block text-sm text-slate-100 truncate">{it.label}</span>{it.sub && <span className="block text-[11px] text-slate-500 truncate">{it.sub}</span>}</span>
                </button>
              </React.Fragment>
            );
          })}
        </div>
        <div className="px-4 py-2 border-t border-white/10 text-[10px] text-slate-500 flex gap-4"><span>↑↓ navigate</span><span>↵ run / open</span><span>esc close</span></div>
      </div>
    </div>
  );
}

  );

function PositionVisual({ pos, video, searchUrl, savedUrl, onSave, onClear }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal] = React.useState(savedUrl || "");
  React.useEffect(() => { setVal(savedUrl || ""); }, [savedUrl, pos.id]);
  const valid = !editing || val.trim() === "" || !!parseYouTube(val);

  return (
    <div className="rounded-3xl glass overflow-hidden ring-1 ring-white/5">
      <div className="aspect-[5/3] relative bg-black">
        {video ? (
          <iframe className="absolute inset-0 w-full h-full" src={embedUrl(video)}
            title={`${pos.name} video`} frameBorder="0" allowFullScreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" />
        ) : (
          <>
            <MatScene layout={pos.layout} />
            <div className="absolute top-3 left-3 flex items-center gap-2">
              <span className="px-2.5 py-1 rounded-full bg-black/40 backdrop-blur text-[11px] font-medium text-slate-200 border border-white/10">{pos.group}</span>
              {pos.perspective !== "neutral" && (
                <span className="px-2.5 py-1 rounded-full bg-black/40 backdrop-blur text-[11px] font-medium border border-white/10"
                  style={{ color: pos.perspective === "top" ? "#5b7cfa" : "#e7ebf5" }}>
                  {pos.perspective === "top" ? "▲ Top POV" : "▼ Bottom POV"}
                </span>
              )}
            </div>
            <a href={searchUrl} target="_blank" rel="noopener noreferrer"
              className="absolute inset-0 flex items-center justify-center group" title="Search YouTube for this position">
              <span className="h-16 w-16 rounded-full bg-rose-600/90 group-hover:bg-rose-500 flex items-center justify-center shadow-2xl transition-transform group-hover:scale-110">
                <svg className="w-7 h-7 text-white ml-1" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </span>
            </a>
            <div className="absolute bottom-0 inset-x-0 p-3 bg-gradient-to-t from-ink-950/90 to-transparent">
              <div className="flex items-center gap-2 text-[11px] text-slate-400">
                <span className="h-2 w-2 rounded-full bg-indigo-400 pulse-dot" /> Diagram — add a clip to replace it with video
              </div>
            </div>
          </>
        )}
      </div>
      <div className="p-2.5 flex flex-wrap items-center gap-2 border-t border-white/5">
        <a href={searchUrl} target="_blank" rel="noopener noreferrer"
          className="text-xs px-2.5 py-1.5 rounded-lg bg-rose-500/15 hover:bg-rose-500/25 text-rose-200 border border-rose-400/30 transition">▶ Search YouTube</a>
        {!editing && (
          <button onClick={() => { setVal(savedUrl || ""); setEditing(true); }}
            className="text-xs px-2.5 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5 transition">
            🎬 {video ? "Replace clip" : "Add clip"}
          </button>
        )}
        {video && !editing && (
          <button onClick={onClear} className="text-xs px-2.5 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-400 border border-white/5 transition">Clear</button>
        )}
        {editing && (
          <div className="flex items-center gap-2 flex-1 min-w-[220px]">
            <input value={val} onChange={e => setVal(e.target.value)} autoFocus
              placeholder="Paste a YouTube link (supports ?t=90 start)"
              className={`flex-1 min-w-0 bg-ink-850 border rounded-lg px-3 py-1.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 ${valid ? "border-white/10 focus:ring-indigo-500/40" : "border-rose-400/50 focus:ring-rose-500/40"}`} />
            <button onClick={() => { onSave(val.trim()); setEditing(false); }} disabled={!parseYouTube(val) && val.trim() !== ""}
              className="text-xs px-2.5 py-1.5 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white disabled:opacity-30 transition">Save</button>
            <button onClick={() => setEditing(false)} className="text-xs px-2 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-400">✕</button>
          </div>
        )}
      </div>
    </div>
  );
}

}

function InsightsModal({ sessions, rolls, learned, srs, drillAgg, activePlan, profile, onAction, onClose }) {
  const insights = buildInsights({ sessions, rolls, learned, srs, activePlan, profile });
  const today = new Date().toISOString().slice(0, 10);
  const wkSessions = sessions.filter(e => weekKey(e.date) === weekKey(today));
  const wkHours = Math.round(wkSessions.reduce((n, e) => n + (e.length || e.minutes || 0), 0) / 60 * 10) / 10;
  const weeks = new Set(sessions.map(e => weekKey(e.date)));
  let streak = 0; const d = new Date(today); if (!weeks.has(weekKey(d))) d.setDate(d.getDate() - 7);
  while (weeks.has(weekKey(d))) { streak++; d.setDate(d.getDate() - 7); }
  const topHit = (() => { const m = {}; rolls.forEach(r => (r.hit || []).forEach(s => { m[s] = (m[s] || 0) + 1; })); const e = Object.entries(m).sort((a, b) => b[1] - a[1])[0]; return e ? e[0] : "—"; })();
  const TONE = { rose: "from-rose-500/10 ring-rose-400/30", emerald: "from-emerald-500/10 ring-emerald-400/30", amber: "from-amber-500/10 ring-amber-400/30", indigo: "from-indigo-500/10 ring-indigo-400/30", sky: "from-sky-500/10 ring-sky-400/30", cyan: "from-cyan-500/10 ring-cyan-400/30", slate: "from-white/5 ring-white/10" };
  const recap = `📋 SubMap weekly recap\n${wkSessions.length} sessions · ${wkHours}h on the mat · 🔥 ${streak}-week streak\nGo-to finish: ${topHit}`;

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-ink-950/85 backdrop-blur-sm">
      <div className="shrink-0 glass border-b border-white/10 px-5 py-3 flex items-center gap-3">
        <span className="text-lg">💡</span><h2 className="font-display font-semibold text-white">Insights</h2>
        <button onClick={onClose} className="ml-auto text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200">Close ✕</button>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-6 space-y-5">
          {/* Weekly recap */}
          <div className="rounded-2xl glass ring-1 ring-white/5 p-5 bg-gradient-to-br from-indigo-500/10 to-transparent">
            <div className="flex items-center gap-2 mb-3">
              <h3 className="text-[11px] font-bold uppercase tracking-widest text-slate-400">This Week</h3>
              <button onClick={() => navigator.clipboard && navigator.clipboard.writeText(recap)} className="ml-auto text-[11px] px-2 py-1 rounded-md bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5">Copy recap</button>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {[[wkSessions.length, "sessions"], [wkHours + "h", "mat time"], ["🔥 " + streak, "week streak"], [topHit, "go-to finish"]].map(([v, l], i) => (
                <div key={i}><div className="text-2xl font-display font-bold text-white truncate">{v}</div><div className="text-xs text-slate-400">{l}</div></div>
              ))}
            </div>
          </div>
          {/* Insight cards */}
          <div className="space-y-3">
            {insights.map((ins, i) => (
              <div key={i} className={`rounded-2xl glass ring-1 p-4 bg-gradient-to-br to-transparent ${TONE[ins.tone] || TONE.slate}`}>
                <div className="flex items-start gap-3">
                  <span className="text-2xl leading-none mt-0.5">{ins.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-white">{ins.title}</div>
                    <div className="text-sm text-slate-300 mt-0.5 leading-relaxed">{ins.body}</div>
                  </div>
                  {ins.cta && (
                    <button onClick={() => onAction(ins.cta.action)} className="shrink-0 text-xs px-3 py-2 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-100 border border-white/10 transition">{ins.cta.label} →</button>
                  )}
                </div>
              </div>
            ))}
          </div>
          <p className="text-[11px] text-slate-600 text-center">Insights update as you log sessions, rolls, learned positions, and drill answers.</p>
        </div>
      </div>
    </div>
  );
}

function deckFor(scope, learnedSet, favSet) {
  let list = Object.values(POSITIONS);
  if (scope === "learn") list = list.filter(p => !learnedSet.has(p.id));
  else if (scope === "fav") list = list.filter(p => favSet.has(p.id));
  else if (scope !== "all") list = list.filter(p => p.group === scope);
  return shuffle(list.map(p => p.id));
}

function StudyModal({ learned, favorites, initialScope = "learn", onToggleLearned, onJump, onClose }) {
  const learnedSet = new Set(learned), favSet = new Set(favorites);
  const [scope, setScope] = React.useState(initialScope);
  const [deck, setDeck] = React.useState(() => deckFor(initialScope, learnedSet, favSet));
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  React.useEffect(() => { setDeck(deckFor(scope, new Set(learned), favSet)); setIdx(0); setFlipped(false); /* eslint-disable-next-line */ }, [scope]);
  const id = deck[idx]; const pos = id ? POSITIONS[id] : null;

  return (

//////////////////////////////////////////////////////////////////////////////
//  ROUND TIMER — interval timer for rounds / positional sparring
//////////////////////////////////////////////////////////////////////////////

function TimerModal({ onClose }) {
  const [cfg, setCfg] = useLocalStorage("bjjflow:timer", { rounds: 5, work: 300, rest: 60, prep: 10 });
  const [audioOn, setAudioOn] = React.useState(true);
  const [running, setRunning] = React.useState(false);
  const [phase, setPhase] = React.useState("idle"); // idle|prep|work|rest|done
  const [round, setRound] = React.useState(0);
  const [remaining, setRemaining] = React.useState(0);
  const segsRef = React.useRef([]); const idxRef = React.useRef(0); const acRef = React.useRef(null);

  const beep = (freq = 880, dur = 0.18, vol = 0.3) => {
    if (!audioOn) return;
    try { const ac = acRef.current || (acRef.current = new (window.AudioContext || window.webkitAudioContext)()); const o = ac.createOscillator(), g = ac.createGain(); o.type = "sine"; o.frequency.value = freq; o.connect(g); g.connect(ac.destination); g.gain.value = vol; o.start(); o.stop(ac.currentTime + dur); } catch (e) {}
  };
  const buildSegs = () => { const s = []; if (cfg.prep > 0) s.push({ type: "prep", len: cfg.prep }); for (let r = 1; r <= cfg.rounds; r++) { s.push({ type: "work", len: cfg.work, round: r }); if (r < cfg.rounds && cfg.rest > 0) s.push({ type: "rest", len: cfg.rest, round: r }); } return s; };
  const start = () => { if (phase === "idle" || phase === "done") { const segs = buildSegs(); segsRef.current = segs; idxRef.current = 0; const s0 = segs[0]; setPhase(s0.type); setRound(s0.round || 0); setRemaining(s0.len); } setRunning(true); beep(660, 0.1); };
  const reset = () => { setRunning(false); setPhase("idle"); setRound(0); setRemaining(0); idxRef.current = 0; };

  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setRemaining(prev => {
        if (prev > 1) { if (prev <= 4) beep(760, 0.08, 0.22); return prev - 1; }
        const nextIdx = idxRef.current + 1; const segs = segsRef.current;
        if (nextIdx >= segs.length) { setRunning(false); setPhase("done"); beep(420, 0.6, 0.35); return 0; }
        idxRef.current = nextIdx; const seg = segs[nextIdx]; setPhase(seg.type); setRound(seg.round || 0); beep(seg.type === "work" ? 990 : 540, 0.4, 0.35); return seg.len;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running]); // eslint-disable-line

  const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
  const phaseColor = { prep: "#818cf8", work: "#34d399", rest: "#fbbf24", done: "#fb7185", idle: "#64748b" }[phase];
  const phaseLabel = { prep: "Get ready", work: "WORK", rest: "Rest", done: "Done!", idle: "Ready" }[phase];
  const presets = [{ label: "5×5 / 1", rounds: 5, work: 300, rest: 60 }, { label: "6×3 / 1", rounds: 6, work: 180, rest: 60 }, { label: "3×5 / 1", rounds: 3, work: 300, rest: 60 }, { label: "10×1 / :30", rounds: 10, work: 60, rest: 30 }];
  const Step = ({ label, val, set, step, fmtV }) => (
    <div className="rounded-xl bg-ink-800/60 ring-1 ring-white/5 p-3 text-center">
      <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-1">{label}</div>
      <div className="flex items-center justify-center gap-2">
        <button onClick={() => set(Math.max(step, val - step))} className="h-6 w-6 rounded bg-ink-700 text-slate-300">−</button>
        <span className="text-lg font-bold text-white w-12">{fmtV ? fmtV(val) : val}</span>
        <button onClick={() => set(val + step)} className="h-6 w-6 rounded bg-ink-700 text-slate-300">+</button>
      </div>
    </div>
  );

  return (
    <div className="fixed inset-0 z-[60] flex flex-col bg-ink-950/90 backdrop-blur-sm">
      <div className="shrink-0 glass border-b border-white/10 px-5 py-3 flex items-center gap-3">
        <span className="text-lg">⏱️</span><h2 className="font-display font-semibold text-white">Round Timer</h2>
        <button onClick={() => setAudioOn(a => !a)} title="Sound" className={`ml-auto text-sm px-2.5 py-1.5 rounded-lg border transition ${audioOn ? "bg-ink-700 text-slate-200 border-white/10" : "bg-ink-800 text-slate-500 border-white/5"}`}>{audioOn ? "🔊" : "🔇"}</button>
        <button onClick={onClose} className="text-sm px-3 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-200">Close ✕</button>
      </div>
      <div className="flex-1 overflow-y-auto flex items-center justify-center">
        <div className="w-full max-w-md px-6 py-8 text-center">
          <div className="text-sm font-bold uppercase tracking-[0.2em] mb-2" style={{ color: phaseColor }}>{phaseLabel}{(phase === "work" || phase === "rest") ? ` · Round ${round}/${cfg.rounds}` : ""}</div>
          <div className="font-display font-bold leading-none my-2" style={{ fontSize: "5.5rem", color: phase === "idle" ? "#e6e9f2" : phaseColor }}>{fmt(phase === "idle" ? cfg.work : remaining)}</div>
          {phase !== "idle" && (
            <div className="h-2 rounded-full bg-ink-700 overflow-hidden mb-5 max-w-xs mx-auto">
              <div className="h-full rounded-full transition-all" style={{ width: phase === "done" ? "100%" : `${100 - (remaining / (segsRef.current[idxRef.current] ? segsRef.current[idxRef.current].len : 1) * 100)}%`, background: phaseColor }} />
            </div>
          )}
          <div className="flex items-center justify-center gap-3 my-5">
            {!running ? (
              <button onClick={start} className="px-8 py-3 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-ink-950 font-bold text-lg transition">{phase === "idle" || phase === "done" ? "▶ Start" : "▶ Resume"}</button>
            ) : (
              <button onClick={() => setRunning(false)} className="px-8 py-3 rounded-xl bg-amber-400 hover:bg-amber-300 text-ink-950 font-bold text-lg transition">⏸ Pause</button>
            )}
            <button onClick={reset} className="px-5 py-3 rounded-xl bg-ink-700 hover:bg-ink-600 text-slate-200 font-semibold transition">↺ Reset</button>
          </div>
          {phase === "idle" && (
            <>
              <div className="grid grid-cols-3 gap-2 mb-3">
                <Step label="Rounds" val={cfg.rounds} set={v => setCfg({ ...cfg, rounds: v })} step={1} />
                <Step label="Work" val={cfg.work} set={v => setCfg({ ...cfg, work: v })} step={30} fmtV={fmt} />
                <Step label="Rest" val={cfg.rest} set={v => setCfg({ ...cfg, rest: v })} step={15} fmtV={fmt} />
              </div>
              <div className="flex flex-wrap justify-center gap-1.5">
                {presets.map(p => (
                  <button key={p.label} onClick={() => setCfg({ ...cfg, rounds: p.rounds, work: p.work, rest: p.rest })} className="text-xs px-2.5 py-1.5 rounded-lg bg-ink-700 hover:bg-ink-600 text-slate-300 border border-white/5 transition">{p.label}</button>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

   ${t}
   <text x="60" y="602" font-family="Arial,sans-serif" font-size="20" fill="#64748b">Mapping my jiu-jitsu with SubMap</text>

  const r = 18, c = 2 * Math.PI * r, pct = Math.min(1, thisWeek / goal);
  const greet = (() => { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening"; })();
  return (
